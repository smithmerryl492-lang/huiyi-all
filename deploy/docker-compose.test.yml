services:
  api_server:
    build:
      context: ../services/api_server
    restart: unless-stopped
    depends_on:
      asr_service:
        condition: service_started
      ai_service:
        condition: service_started
    ports:
      - "${HUIXIAO_TEST_API_PORT:-28080}:8080"
    environment:
      HUIXIAO_DATABASE_URL: ${HUIXIAO_DATABASE_URL:?HUIXIAO_DATABASE_URL is required}
      HUIXIAO_DB_CONNECT_TIMEOUT_SECONDS: ${HUIXIAO_DB_CONNECT_TIMEOUT_SECONDS:-10}
      HUIXIAO_DB_READ_TIMEOUT_SECONDS: ${HUIXIAO_DB_READ_TIMEOUT_SECONDS:-60}
      HUIXIAO_DB_WRITE_TIMEOUT_SECONDS: ${HUIXIAO_DB_WRITE_TIMEOUT_SECONDS:-60}
      HUIXIAO_ASR_SERVICE_URL: http://asr_service:8081
      HUIXIAO_ASR_LIVE_WS_URL: ws://asr_service:8081/api/v1/live/ws
      HUIXIAO_PUBLIC_API_BASE_URL: ${HUIXIAO_PUBLIC_API_BASE_URL:-http://43.154.197.96:28080}
      HUIXIAO_TEMP_AUDIO_URL_TTL_SECONDS: ${HUIXIAO_TEMP_AUDIO_URL_TTL_SECONDS:-1800}
      HUIXIAO_LLM_API_KEY: ${HUIXIAO_LLM_API_KEY:?HUIXIAO_LLM_API_KEY is required}
      HUIXIAO_ALIYUN_DASHSCOPE_API_KEY: ${HUIXIAO_ALIYUN_DASHSCOPE_API_KEY:-}
      HUIXIAO_ALIYUN_WORKSPACE_ID: ${HUIXIAO_ALIYUN_WORKSPACE_ID:-}
      HUIXIAO_ALIYUN_REGION: ${HUIXIAO_ALIYUN_REGION:-cn-beijing}
      HUIXIAO_ALIYUN_API_HOST: ${HUIXIAO_ALIYUN_API_HOST:-}
      HUIXIAO_ALIYUN_REALTIME_WS_URL: ${HUIXIAO_ALIYUN_REALTIME_WS_URL:-}
      HUIXIAO_ALIYUN_REALTIME_TOKEN_URL: ${HUIXIAO_ALIYUN_REALTIME_TOKEN_URL:-}
      HUIXIAO_ALIYUN_REALTIME_MODEL: ${HUIXIAO_ALIYUN_REALTIME_MODEL:-qwen3-asr-flash-realtime}
      HUIXIAO_ALIYUN_REALTIME_DIRECT_ENABLED: ${HUIXIAO_ALIYUN_REALTIME_DIRECT_ENABLED:-true}
      HUIXIAO_ALIYUN_REALTIME_TOKEN_TTL_SECONDS: ${HUIXIAO_ALIYUN_REALTIME_TOKEN_TTL_SECONDS:-1800}
      HUIXIAO_ALIYUN_REALTIME_TOKEN_REQUEST_TIMEOUT_SECONDS: ${HUIXIAO_ALIYUN_REALTIME_TOKEN_REQUEST_TIMEOUT_SECONDS:-5}
      HUIXIAO_ALIYUN_REALTIME_TOKEN_REFRESH_MARGIN_SECONDS: ${HUIXIAO_ALIYUN_REALTIME_TOKEN_REFRESH_MARGIN_SECONDS:-180}
      HUIXIAO_ALIYUN_REALTIME_PREWARM_ENABLED: ${HUIXIAO_ALIYUN_REALTIME_PREWARM_ENABLED:-true}
      HUIXIAO_ALIYUN_LIVE_VAD_THRESHOLD: ${HUIXIAO_ALIYUN_LIVE_VAD_THRESHOLD:-0.35}
      HUIXIAO_ALIYUN_LIVE_VAD_SILENCE_DURATION_MS: ${HUIXIAO_ALIYUN_LIVE_VAD_SILENCE_DURATION_MS:-450}
      HUIXIAO_ALIYUN_LIVE_FILTER_FILLER: ${HUIXIAO_ALIYUN_LIVE_FILTER_FILLER:-true}
      HUIXIAO_ALIYUN_LIVE_FILLER_MAX_DURATION_MS: ${HUIXIAO_ALIYUN_LIVE_FILLER_MAX_DURATION_MS:-1200}
      HUIXIAO_ASR_FILE_TIMEOUT_SECONDS: ${HUIXIAO_ASR_FILE_TIMEOUT_SECONDS:-32400}
      HUIXIAO_ASR_VOICEPRINT_TIMEOUT_MIN_SECONDS: ${HUIXIAO_ASR_VOICEPRINT_TIMEOUT_MIN_SECONDS:-600}
      HUIXIAO_ASR_VOICEPRINT_TIMEOUT_BUFFER_SECONDS: ${HUIXIAO_ASR_VOICEPRINT_TIMEOUT_BUFFER_SECONDS:-600}
      HUIXIAO_ASR_VOICEPRINT_TIMEOUT_PER_AUDIO_SECOND: ${HUIXIAO_ASR_VOICEPRINT_TIMEOUT_PER_AUDIO_SECOND:-1.5}
      HUIXIAO_ASR_VOICEPRINT_TIMEOUT_MAX_SECONDS: ${HUIXIAO_ASR_VOICEPRINT_TIMEOUT_MAX_SECONDS:-14400}
      HUIXIAO_ASR_VOICEPRINT_ENROLL_TIMEOUT_SECONDS: ${HUIXIAO_ASR_VOICEPRINT_ENROLL_TIMEOUT_SECONDS:-600}
      HUIXIAO_TASK_PROCESSING_CONCURRENCY: ${HUIXIAO_TASK_PROCESSING_CONCURRENCY:-1}
      HUIXIAO_AI_SERVICE_URL: http://ai_service:8082
      HUIXIAO_AI_MINUTES_TIMEOUT_MIN_SECONDS: ${HUIXIAO_AI_MINUTES_TIMEOUT_MIN_SECONDS:-1800}
      HUIXIAO_AI_MINUTES_TIMEOUT_BUFFER_SECONDS: ${HUIXIAO_AI_MINUTES_TIMEOUT_BUFFER_SECONDS:-1800}
      HUIXIAO_AI_MINUTES_TIMEOUT_PER_AUDIO_SECOND: ${HUIXIAO_AI_MINUTES_TIMEOUT_PER_AUDIO_SECOND:-2.5}
      HUIXIAO_AI_MINUTES_TIMEOUT_MAX_SECONDS: ${HUIXIAO_AI_MINUTES_TIMEOUT_MAX_SECONDS:-21600}
      HUIXIAO_AI_EMBEDDING_TIMEOUT_SECONDS: ${HUIXIAO_AI_EMBEDDING_TIMEOUT_SECONDS:-600}
      HUIXIAO_AI_KNOWLEDGE_PLAN_TIMEOUT_SECONDS: ${HUIXIAO_AI_KNOWLEDGE_PLAN_TIMEOUT_SECONDS:-180}
      HUIXIAO_AI_KNOWLEDGE_ANSWER_TIMEOUT_SECONDS: ${HUIXIAO_AI_KNOWLEDGE_ANSWER_TIMEOUT_SECONDS:-600}
      HUIXIAO_STALE_PROCESSING_TIMEOUT_SECONDS: ${HUIXIAO_STALE_PROCESSING_TIMEOUT_SECONDS:-64800}
      HUIXIAO_DATA_DIR: /data
      HUIXIAO_MAX_UPLOAD_MB: ${HUIXIAO_MAX_UPLOAD_MB:-500}
      HUIXIAO_CORS_ORIGINS: ${HUIXIAO_CORS_ORIGINS:-*}
      HUIXIAO_AUTH_TOKEN_SECRET: ${HUIXIAO_AUTH_TOKEN_SECRET:-huixiao-dev-token-secret-change-me}
      HUIXIAO_AUTH_TOKEN_TTL_SECONDS: ${HUIXIAO_AUTH_TOKEN_TTL_SECONDS:-2592000}
      HUIXIAO_ALIPAY_APP_ID: ${HUIXIAO_ALIPAY_APP_ID:-}
      HUIXIAO_ALIPAY_PRIVATE_KEY: ${HUIXIAO_ALIPAY_PRIVATE_KEY:-}
      HUIXIAO_ALIPAY_PUBLIC_KEY: ${HUIXIAO_ALIPAY_PUBLIC_KEY:-}
      HUIXIAO_ALIPAY_NOTIFY_URL: ${HUIXIAO_ALIPAY_NOTIFY_URL:-}
      HUIXIAO_ALIPAY_GATEWAY_URL: ${HUIXIAO_ALIPAY_GATEWAY_URL:-https://openapi.alipay.com/gateway.do}
      HUIXIAO_ALIPAY_AES_KEY: ${HUIXIAO_ALIPAY_AES_KEY:-}
      HUIXIAO_ALIPAY_PAYMENT_MODE: ${HUIXIAO_ALIPAY_PAYMENT_MODE:-wap}
      HUIXIAO_ALIPAY_RETURN_URL: ${HUIXIAO_ALIPAY_RETURN_URL:-}
      HUIXIAO_APPLE_IAP_ENABLED: ${HUIXIAO_APPLE_IAP_ENABLED:-false}
      HUIXIAO_APPLE_PRODUCT_PREFIX: ${HUIXIAO_APPLE_PRODUCT_PREFIX:-com.kunqiong.huiyi}
      HUIXIAO_APPLE_BUNDLE_ID: ${HUIXIAO_APPLE_BUNDLE_ID:-com.huiyi.app.ios}
      HUIXIAO_APPLE_ISSUER_ID: ${HUIXIAO_APPLE_ISSUER_ID:-}
      HUIXIAO_APPLE_KEY_ID: ${HUIXIAO_APPLE_KEY_ID:-}
      HUIXIAO_APPLE_PRIVATE_KEY: ${HUIXIAO_APPLE_PRIVATE_KEY:-}
      HUIXIAO_APPLE_ENVIRONMENT: ${HUIXIAO_APPLE_ENVIRONMENT:-sandbox}
      HUIXIAO_TENCENT_SMS_SECRET_ID: ${HUIXIAO_TENCENT_SMS_SECRET_ID:-}
      HUIXIAO_TENCENT_SMS_SECRET_KEY: ${HUIXIAO_TENCENT_SMS_SECRET_KEY:-}
      HUIXIAO_TENCENT_SMS_SDK_APP_ID: ${HUIXIAO_TENCENT_SMS_SDK_APP_ID:-}
      HUIXIAO_TENCENT_SMS_SIGN_NAME: ${HUIXIAO_TENCENT_SMS_SIGN_NAME:-}
      HUIXIAO_TENCENT_SMS_REGION: ${HUIXIAO_TENCENT_SMS_REGION:-ap-guangzhou}
      HUIXIAO_SMS_TEMPLATE_ID: ${HUIXIAO_SMS_TEMPLATE_ID:-}
      HUIXIAO_SMS_TEMPLATE_LOGIN_ID: ${HUIXIAO_SMS_TEMPLATE_LOGIN_ID:-}
      HUIXIAO_SMS_TEMPLATE_CHANGE_PHONE_ID: ${HUIXIAO_SMS_TEMPLATE_CHANGE_PHONE_ID:-}
      HUIXIAO_SMS_TEMPLATE_CHANGE_PASSWORD_ID: ${HUIXIAO_SMS_TEMPLATE_CHANGE_PASSWORD_ID:-}
      HUIXIAO_SMS_CODE_TTL_SECONDS: ${HUIXIAO_SMS_CODE_TTL_SECONDS:-300}
      HUIXIAO_SMS_RESEND_COOLDOWN_SECONDS: ${HUIXIAO_SMS_RESEND_COOLDOWN_SECONDS:-60}
      HUIXIAO_SMS_CODE_LENGTH: ${HUIXIAO_SMS_CODE_LENGTH:-6}
      HUIXIAO_SMS_TEMPLATE_PARAM_MODE: ${HUIXIAO_SMS_TEMPLATE_PARAM_MODE:-code}
      HUIXIAO_SMS_MAX_ATTEMPTS: ${HUIXIAO_SMS_MAX_ATTEMPTS:-5}
      HUIXIAO_SMS_PHONE_DAILY_LIMIT: ${HUIXIAO_SMS_PHONE_DAILY_LIMIT:-10}
      HUIXIAO_SMS_IP_DAILY_LIMIT: ${HUIXIAO_SMS_IP_DAILY_LIMIT:-60}
      HUIXIAO_SMS_DEV_CODE: ${HUIXIAO_SMS_DEV_CODE:-}
    volumes:
      - api_server_data:/data

  asr_service:
    build:
      context: ../services/asr_service
    restart: unless-stopped
    environment:
      HUIXIAO_FFMPEG_PATH: ffmpeg
      HUIXIAO_ASR_DEVICE: ${HUIXIAO_ASR_DEVICE:-cpu}
      HUIXIAO_ASR_MAX_SPEAKERS: ${HUIXIAO_ASR_MAX_SPEAKERS:-15}
      HUIXIAO_FUNASR_RUNTIME_WS_URL: ws://funasr_runtime:10095
      HUIXIAO_LIVE_ASR_PROVIDER: ${HUIXIAO_LIVE_ASR_PROVIDER:-aliyun}
      HUIXIAO_LLM_API_KEY: ${HUIXIAO_LLM_API_KEY:?HUIXIAO_LLM_API_KEY is required}
      HUIXIAO_ALIYUN_DASHSCOPE_API_KEY: ${HUIXIAO_ALIYUN_DASHSCOPE_API_KEY:-}
      HUIXIAO_ALIYUN_WORKSPACE_ID: ${HUIXIAO_ALIYUN_WORKSPACE_ID:-}
      HUIXIAO_ALIYUN_REGION: ${HUIXIAO_ALIYUN_REGION:-cn-beijing}
      HUIXIAO_ALIYUN_API_HOST: ${HUIXIAO_ALIYUN_API_HOST:-}
      HUIXIAO_ALIYUN_REALTIME_WS_URL: ${HUIXIAO_ALIYUN_REALTIME_WS_URL:-}
      HUIXIAO_ALIYUN_REALTIME_MODEL: ${HUIXIAO_ALIYUN_REALTIME_MODEL:-qwen3-asr-flash-realtime}
      HUIXIAO_ALIYUN_FILE_MODEL: ${HUIXIAO_ALIYUN_FILE_MODEL:-qwen3-asr-flash-filetrans}
      HUIXIAO_ALIYUN_FILE_TRANSCRIPTION_URL: ${HUIXIAO_ALIYUN_FILE_TRANSCRIPTION_URL:-}
      HUIXIAO_ALIYUN_FILE_TASK_URL: ${HUIXIAO_ALIYUN_FILE_TASK_URL:-}
      HUIXIAO_ALIYUN_FILE_POLL_INTERVAL_SECONDS: ${HUIXIAO_ALIYUN_FILE_POLL_INTERVAL_SECONDS:-2}
      HUIXIAO_ALIYUN_FILE_POLL_TIMEOUT_SECONDS: ${HUIXIAO_ALIYUN_FILE_POLL_TIMEOUT_SECONDS:-7200}
      HUIXIAO_ALIYUN_LIVE_VAD_THRESHOLD: ${HUIXIAO_ALIYUN_LIVE_VAD_THRESHOLD:-0.35}
      HUIXIAO_ALIYUN_LIVE_VAD_SILENCE_DURATION_MS: ${HUIXIAO_ALIYUN_LIVE_VAD_SILENCE_DURATION_MS:-450}
      HUIXIAO_ALIYUN_LIVE_FILTER_FILLER: ${HUIXIAO_ALIYUN_LIVE_FILTER_FILLER:-true}
      HUIXIAO_ALIYUN_LIVE_FILLER_MAX_DURATION_MS: ${HUIXIAO_ALIYUN_LIVE_FILLER_MAX_DURATION_MS:-1200}
      HUIXIAO_ASR_MAX_LIVE_SESSIONS: ${HUIXIAO_ASR_MAX_LIVE_SESSIONS:-24}
      HUIXIAO_ASR_MAX_FILE_TRANSCRIPTIONS: ${HUIXIAO_ASR_MAX_FILE_TRANSCRIPTIONS:-2}
      HUIXIAO_ASR_MAX_VOICEPRINT_JOBS: ${HUIXIAO_ASR_MAX_VOICEPRINT_JOBS:-2}
      HUIXIAO_AUDIO_PREPARE_TIMEOUT_SECONDS: ${HUIXIAO_AUDIO_PREPARE_TIMEOUT_SECONDS:-14400}
      HUIXIAO_LIVE_ASR_MODE: ${HUIXIAO_LIVE_ASR_MODE:-online_refine}
      HUIXIAO_LIVE_CHUNK_SIZE: ${HUIXIAO_LIVE_CHUNK_SIZE:-0,8,4}
      HUIXIAO_LIVE_CHUNK_INTERVAL: ${HUIXIAO_LIVE_CHUNK_INTERVAL:-8}
      HUIXIAO_LIVE_REQUIRE_SPEAKER: ${HUIXIAO_LIVE_REQUIRE_SPEAKER:-false}
      HUIXIAO_FILE_ASR_SEND_REALTIME_FACTOR: ${HUIXIAO_FILE_ASR_SEND_REALTIME_FACTOR:-6.0}
      HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_MIN_SECONDS: ${HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_MIN_SECONDS:-1800}
      HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_BUFFER_SECONDS: ${HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_BUFFER_SECONDS:-1800}
      HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_PER_AUDIO_SECOND: ${HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_PER_AUDIO_SECOND:-3.0}
      HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_MAX_SECONDS: ${HUIXIAO_FILE_ASR_RUNTIME_TIMEOUT_MAX_SECONDS:-28800}
      MODELSCOPE_DOMAIN: ${MODELSCOPE_DOMAIN:-modelscope.cn}
      MODELSCOPE_DOWNLOAD_PARALLELS: ${MODELSCOPE_DOWNLOAD_PARALLELS:-4}
      MODELSCOPE_PARALLEL_DOWNLOAD_THRESHOLD_MB: ${MODELSCOPE_PARALLEL_DOWNLOAD_THRESHOLD_MB:-64}
    volumes:
      - asr_model_cache:/root/.cache/modelscope
      - api_server_data:/data

  funasr_runtime:
    build:
      context: .
      dockerfile: funasr-runtime.Dockerfile
    restart: unless-stopped
    environment:
      MODELSCOPE_DOMAIN: ${MODELSCOPE_DOMAIN:-modelscope.cn}
      MODELSCOPE_DOWNLOAD_PARALLELS: ${MODELSCOPE_DOWNLOAD_PARALLELS:-4}
      MODELSCOPE_PARALLEL_DOWNLOAD_THRESHOLD_MB: ${MODELSCOPE_PARALLEL_DOWNLOAD_THRESHOLD_MB:-64}
    command:
      - python
      - -u
      - /app/funasr_wss_server.py
      - --host
      - 0.0.0.0
      - --port
      - "10095"
      - --device
      - ${HUIXIAO_FUNASR_RUNTIME_DEVICE:-cpu}
      - --ngpu
      - "${HUIXIAO_FUNASR_RUNTIME_NGPU:-0}"
      - --ncpu
      - "${HUIXIAO_FUNASR_RUNTIME_NCPU:-2}"
      - --worker_threads
      - "${HUIXIAO_FUNASR_WORKER_THREADS:-4}"
      - --concurrent_vad
      - "${HUIXIAO_FUNASR_CONCURRENT_VAD:-4}"
      - --concurrent_asr_online
      - "${HUIXIAO_FUNASR_CONCURRENT_ASR_ONLINE:-4}"
      - --concurrent_asr_offline
      - "${HUIXIAO_FUNASR_CONCURRENT_ASR_OFFLINE:-2}"
      - --concurrent_punc
      - "${HUIXIAO_FUNASR_CONCURRENT_PUNC:-1}"
      - --concurrent_sv
      - "${HUIXIAO_FUNASR_CONCURRENT_SV:-1}"
      - --max_speakers
      - "${HUIXIAO_ASR_MAX_SPEAKERS:-15}"
      - --speaker_cluster_threshold
      - "${HUIXIAO_SPEAKER_CLUSTER_THRESHOLD:-0.62}"
      - --vad_max_end_silence_time
      - "${HUIXIAO_FUNASR_VAD_MAX_END_SILENCE_MS:-800}"
      - --offline_endpoint_delay_ms
      - "${HUIXIAO_FUNASR_OFFLINE_ENDPOINT_DELAY_MS:-300}"
      - --offline_merge_silence_ms
      - "${HUIXIAO_FUNASR_OFFLINE_MERGE_SILENCE_MS:-260}"
      - --offline_pre_roll_ms
      - "${HUIXIAO_FUNASR_OFFLINE_PRE_ROLL_MS:-240}"
      - --certfile=
      - --keyfile=
    volumes:
      - funasr_cache:/root/.cache/modelscope

  ai_service:
    build:
      context: ../services/ai_service
    restart: unless-stopped
    environment:
      HUIXIAO_LLM_BASE_URL: ${HUIXIAO_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      HUIXIAO_LLM_API_KEY: ${HUIXIAO_LLM_API_KEY:?HUIXIAO_LLM_API_KEY is required}
      HUIXIAO_LLM_MODEL: ${HUIXIAO_LLM_MODEL:-qwen3.7-plus}
      HUIXIAO_EMBEDDING_MODEL: ${HUIXIAO_EMBEDDING_MODEL:-text-embedding-v4}
      HUIXIAO_EMBEDDING_DIMENSIONS: ${HUIXIAO_EMBEDDING_DIMENSIONS:-1024}
      HUIXIAO_LLM_TIMEOUT_SECONDS: ${HUIXIAO_LLM_TIMEOUT_SECONDS:-120}
      HUIXIAO_LLM_ATTEMPT_TIMEOUT_SECONDS: ${HUIXIAO_LLM_ATTEMPT_TIMEOUT_SECONDS:-120}
      HUIXIAO_LLM_RETRY_COUNT: ${HUIXIAO_LLM_RETRY_COUNT:-4}
      HUIXIAO_LLM_TEMPERATURE: ${HUIXIAO_LLM_TEMPERATURE:-0.2}
      HUIXIAO_EMBEDDING_TIMEOUT_SECONDS: ${HUIXIAO_EMBEDDING_TIMEOUT_SECONDS:-600}
      HUIXIAO_KNOWLEDGE_PLAN_TIMEOUT_SECONDS: ${HUIXIAO_KNOWLEDGE_PLAN_TIMEOUT_SECONDS:-180}
      HUIXIAO_KNOWLEDGE_ANSWER_TIMEOUT_SECONDS: ${HUIXIAO_KNOWLEDGE_ANSWER_TIMEOUT_SECONDS:-600}
      HUIXIAO_AI_MINUTES_CONCURRENCY: ${HUIXIAO_AI_MINUTES_CONCURRENCY:-2}
      HUIXIAO_AI_KNOWLEDGE_ANSWER_CONCURRENCY: ${HUIXIAO_AI_KNOWLEDGE_ANSWER_CONCURRENCY:-2}
      HUIXIAO_AI_EMBEDDING_CONCURRENCY: ${HUIXIAO_AI_EMBEDDING_CONCURRENCY:-2}
      HUIXIAO_MINUTES_ENABLE_THINKING: ${HUIXIAO_MINUTES_ENABLE_THINKING:-false}
      HUIXIAO_MINUTES_THINKING_BUDGET: ${HUIXIAO_MINUTES_THINKING_BUDGET:-0}
      HUIXIAO_MINUTES_TIMEOUT_MIN_SECONDS: ${HUIXIAO_MINUTES_TIMEOUT_MIN_SECONDS:-900}
      HUIXIAO_MINUTES_TIMEOUT_BUFFER_SECONDS: ${HUIXIAO_MINUTES_TIMEOUT_BUFFER_SECONDS:-900}
      HUIXIAO_MINUTES_TIMEOUT_PER_AUDIO_SECOND: ${HUIXIAO_MINUTES_TIMEOUT_PER_AUDIO_SECOND:-2.0}
      HUIXIAO_MINUTES_TIMEOUT_MAX_SECONDS: ${HUIXIAO_MINUTES_TIMEOUT_MAX_SECONDS:-18000}
      HUIXIAO_MINUTES_RETRY_COUNT: ${HUIXIAO_MINUTES_RETRY_COUNT:-1}

volumes:
  api_server_data:
  asr_model_cache:
  funasr_cache:
