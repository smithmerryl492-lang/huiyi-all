    }

    function applyDispatchRecordFilters() {
      dispatchRecordKeyword = document.getElementById("dispatchRecordKeyword")?.value.trim() || "";
      dispatchRecordTypeFilter = document.getElementById("dispatchRecordTypeFilter")?.value || "全部";
      dispatchRecordSort = document.getElementById("dispatchRecordSort")?.value || dispatchRecordSort;
      if (dispatchRecordStartDate && dispatchRecordEndDate && dispatchRecordStartDate > dispatchRecordEndDate) {
        showToast("发放时间范围无效");
        return;
      }
      tablePages.dispatchRecords = 1;
      renderDispatch();
    }

    function resetDispatchRecordFilters() {
      dispatchRecordKeyword = "";
      dispatchRecordTypeFilter = "全部";
      dispatchRecordStartDate = "";
      dispatchRecordEndDate = "";
      dispatchRecordSort = "timeDesc";
      tablePages.dispatchRecords = 1;
      renderDispatch();
    }

    function renderDispatch() {
      root.innerHTML = `
        <div class="view-stack">
          ${renderDispatchTabs()}
          ${dispatchTab === "create"
            ? renderDispatchStepBar() + (dispatchStep === "audience" ? renderDispatchAudience() : dispatchStep === "content" ? renderDispatchContent() : renderDispatchConfirm())
            : renderDispatchRecords()}
        </div>
      `;
    }

    function removeDispatchUser(userId) {
      dispatchUserIds = dispatchUserIds.filter(id => id !== userId);
      tablePages.dispatchUsers = 1;
      renderDispatch();
    }

    function applyDispatchAudienceFilter() {
      dispatchAudienceMode = document.getElementById("dispatchAudienceMode")?.value || dispatchAudienceMode;
      dispatchFilterPlanId = document.getElementById("dispatchFilterPlanId")?.value || dispatchFilterPlanId;
      dispatchFilterStatus = document.getElementById("dispatchFilterStatus")?.value || dispatchFilterStatus;
      dispatchFilterKeyword = document.getElementById("dispatchFilterKeyword")?.value || dispatchFilterKeyword;
      dispatchSort = document.getElementById("dispatchSort")?.value || dispatchSort;
      if (dispatchAudienceMode === "periodPurchase" && dispatchFilterStartDate && dispatchFilterEndDate && dispatchFilterStartDate > dispatchFilterEndDate) {
        showToast("购买时间范围无效");
        return;
      }
      if (dispatchAudienceMode === "currentList") {
        dispatchFilterStatus = dispatchFilterStatus || "全部";
      }
      tablePages.dispatchUsers = 1;
      renderDispatch();
    }

    function resetDispatchAudienceFilter() {
      dispatchAudienceMode = "periodPurchase";
      dispatchFilterPlanId = "plus";
      dispatchFilterStartDate = "2026-05-01";
      dispatchFilterEndDate = "2026-05-31";
      dispatchFilterBeforeDate = "2026-06-01";
      dispatchFilterStatus = "正常";
      dispatchFilterKeyword = "";
      dispatchSort = "purchaseDesc";
      tablePages.dispatchUsers = 1;
      renderDispatch();
    }

    function confirmDispatch() {
      collectDispatchForm();
      const recipients = dispatchRecipients();
      if (!recipients.length) {
        showToast("请先确定发放对象");
        return;
      }
      const content = dispatchContentText();
      dispatchBatches.unshift({
        time: nowText(),
        type: "权益发放",
        scope: dispatchAudienceLabel(),
        count: recipients.length,
        content,
        reason: dispatchReason || "-",
        status: "已完成"
      });
      if (["benefit", "member"].includes(dispatchType)) {
        recipients.forEach(user => {
          const before = `${user.member} / ${user.memberExpire}`;
          user.member = "会员";
          user.memberExpire = addDays(user.memberExpire, Math.max(1, Number(dispatchMemberDays) || 1));
          addChangeRecord(user, "统一发放会员", before, `会员至 ${user.memberExpire}`, dispatchReason || "-");
        });
      }
      dispatchTab = "records";
      dispatchStep = "audience";
      tablePages.dispatchRecords = 1;
      renderApp();
      showToast(`已发放给 ${recipients.length} 个用户`);
    }

    function collectDispatchForm() {
      dispatchType = document.getElementById("dispatchType")?.value || dispatchType;
      dispatchReason = document.getElementById("dispatchReason")?.value.trim() || dispatchReason;
      dispatchMemberDays = document.getElementById("dispatchMemberDays")?.value || dispatchMemberDays;
      dispatchHours = document.getElementById("dispatchHours")?.value || dispatchHours;
      dispatchQa = document.getElementById("dispatchQa")?.value || dispatchQa;
      dispatchManualText = document.getElementById("dispatchManualText")?.value || dispatchManualText;
    }

    function renderChanges() {
      const filteredRecords = sortChangeRecords(changeRecords.filter(record => {
        const keyword = changeKeyword.trim().toLowerCase();
        const user = userById(record.userId);
        const hitKeyword = !keyword || [record.time, record.userId, user?.name, record.type, record.before, record.after, record.note].some(value => String(value || "").toLowerCase().includes(keyword));
        const hitType = changeTypeFilter === "全部" || record.type === changeTypeFilter;
        const hitDate = dateInRange(recordDate(record.time), changeStartDate, changeEndDate);
        return hitKeyword && hitType && hitDate;
      }));
      const visibleRecords = pagedItems("changes", filteredRecords);
      root.innerHTML = panel("套餐变更记录", "记录后台对会员、冻结和当月套餐的调整", `
        <div class="filter-bar">
          <label class="filter-item">
            <span>关键字</span>
            <input class="filter-date search-input" id="changeKeyword" value="${changeKeyword}" placeholder="用户 / 类型 / 备注" onkeydown="if(event.key==='Enter') applyChangeFilters()" />
          </label>
          <label class="filter-item">
            <span>类型</span>
            <select class="filter-select" id="changeTypeFilter">
              <option ${changeTypeFilter === "全部" ? "selected" : ""}>全部</option>
              ${uniqueValues(changeRecords.map(record => record.type)).map(type => `<option ${changeTypeFilter === type ? "selected" : ""}>${type}</option>`).join("")}
            </select>
          </label>
          ${dateRangeControl("changes", "变更时间", changeStartDate, changeEndDate)}
          ${sortControl("changeSort", changeSort, [
            { value: "timeDesc", label: "变更时间倒序" },
            { value: "timeAsc", label: "变更时间正序" },
            { value: "userAsc", label: "用户ID升序" },
            { value: "userDesc", label: "用户ID降序" }
          ])}
          <div class="filter-actions">
            <button class="primary-btn filter-btn" onclick="applyChangeFilters()">查询</button>
            <button class="text-btn filter-btn" onclick="resetChangeFilters()">重置</button>
          </div>
        </div>
        <div class="table-scroll">
          <table class="data-table records-table">
            <colgroup>
              <col class="col-time" />
              <col class="col-user" />
              <col class="col-type" />
              <col class="col-before" />
              <col class="col-after" />
              <col class="col-note" />
            </colgroup>
            <thead><tr><th>时间</th><th>用户</th><th>类型</th><th>调整前</th><th>调整后</th><th>备注</th></tr></thead>
            <tbody>
              ${visibleRecords.length ? visibleRecords.map(record => `
                <tr>
                  <td>${record.time}</td>
                  <td><strong>${userName(record.userId)}</strong><span class="sub-text">${record.userId}</span></td>
                  <td>${record.type}</td>
                  <td>${record.before}</td>
                  <td>${record.after}</td>
                  <td>${record.note}</td>
                </tr>
              `).join("") : `<tr><td colspan="6" class="muted">暂无符合条件的变更记录</td></tr>`}
            </tbody>
          </table>
        </div>
        ${renderPager("changes", filteredRecords.length)}
      `);
    }

    function applyChangeFilters() {
      changeKeyword = document.getElementById("changeKeyword")?.value.trim() || "";
      changeTypeFilter = document.getElementById("changeTypeFilter")?.value || "全部";
      changeSort = document.getElementById("changeSort")?.value || changeSort;
      if (changeStartDate && changeEndDate && changeStartDate > changeEndDate) {
        showToast("变更时间范围无效");
        return;
      }
      tablePages.changes = 1;
      renderChanges();
    }

    function resetChangeFilters() {
      changeKeyword = "";
      changeTypeFilter = "全部";
      changeStartDate = "";
      changeEndDate = "";
      changeSort = "timeDesc";
      tablePages.changes = 1;
      renderChanges();
    }

    function renderCurrentView() {
      if (currentView === "users") renderUsers();
      if (currentView === "detail") renderDetail();
      if (currentView === "data") renderData();
      if (currentView === "orders") renderOrders();
      if (currentView === "dispatch") renderDispatch();
      if (currentView === "announcements") renderAnnouncements();
      if (currentView === "pricing") renderPricing();
      if (currentView === "changes") renderChanges();
    }

    function renderApp() {
      renderNav();
      setPageMeta();
      renderCurrentView();
    }

    function addDays(dateStr, days) {
      const base = dateStr === "-" ? new Date() : new Date(`${dateStr}T00:00:00`);
      if (Number.isNaN(base.getTime())) return dateStr;
      base.setDate(base.getDate() + days);
      const year = base.getFullYear();
      const month = String(base.getMonth() + 1).padStart(2, "0");
      const day = String(base.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function openModal() {
      modalBackdrop.classList.add("open");
      const firstInput = modalBody.querySelector("input,select,textarea");
      setTimeout(() => firstInput?.focus(), 50);
    }

    function setModalLayout(size = "", bodyClass = "") {
      modal.className = `modal ${size}`.trim();
      modalBody.className = `modal-body ${bodyClass}`.trim();
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      setModalLayout();
      currentModal = null;
      modalContext = null;
    }

    function openFreezeModal(user) {
      currentModal = user.status === "冻结" ? "unfreezeUser" : "freezeUser";
      modalContext = user;
      setModalLayout("modal-wide", "single-form");
      modalTitle.textContent = `${user.status === "冻结" ? "解除冻结" : "冻结用户"} - ${user.name}`;
      modalBody.innerHTML = user.status === "冻结" ? `
        <div class="form-note">解除冻结后，该用户恢复正常状态。</div>
        <div class="form-item full"><label>备注</label><textarea id="freezeNote" placeholder="可填写解除冻结说明"></textarea></div>
      ` : `
        <div class="form-note warn">冻结后，该用户状态会变为冻结。这里仅做原型记录，不连接真实账号权限。</div>
        <div class="form-item full"><label>冻结原因</label><select id="freezeReason"><option>异常使用</option><option>人工处理</option><option>用户申请</option><option>其他</option></select></div>
        <div class="form-item full"><label>备注</label><textarea id="freezeNote" placeholder="可补充具体原因"></textarea></div>
      `;
      openModal();
    }

    function openGiftMemberModal(user) {
      currentModal = "giftMember";
      modalContext = user;
      setModalLayout("modal-wide", "triple-form");
      modalTitle.textContent = `赠送权益 - ${user.name}`;
      modalBody.innerHTML = `
        <div class="form-item"><label>会员天数</label><input id="giftDays" type="number" min="0" value="30" /></div>
        <div class="form-item"><label>转写时长/小时</label><input id="giftHours" type="number" min="0" value="0" /></div>
        <div class="form-item"><label>问答次数</label><input id="giftQa" type="number" min="0" value="0" /></div>
        <div class="form-item full"><label>备注</label><textarea id="giftNote" placeholder="例如：人工补偿、活动赠送"></textarea></div>
      `;
      openModal();
    }

    function openEditMemberModal(user) {
      currentModal = "editMember";
      modalContext = user;
      setModalLayout();
      modalTitle.textContent = `修改会员 - ${user.name}`;
      modalBody.innerHTML = `
        <div class="form-item"><label>会员类型</label><select id="memberLevel"><option ${user.member === "无会员" ? "selected" : ""}>无会员</option><option ${user.member === "会员" ? "selected" : ""}>会员</option></select></div>
        <div class="form-item"><label>会员到期</label><input id="memberExpire" type="date" value="${user.memberExpire === "-" ? "" : user.memberExpire}" /></div>
      `;
      openModal();
    }

    function openChangePlanModal(user) {
      currentModal = "changePlan";
      modalContext = user;
      setModalLayout("modal-wide", "single-form");
      modalTitle.textContent = `更改此人此月套餐 - ${user.name}`;
      const availablePlans = plans.filter(plan => plan.enabled || plan.id === user.monthPlanId);
      modalBody.innerHTML = `
        <div class="form-note">此操作只影响此人当前月份套餐，不修改固定套餐定价，也不影响其他用户。</div>
        <div class="form-item full"><label>本月套餐</label><select id="monthPlan">${availablePlans.map(plan => `<option value="${plan.id}" ${plan.id === user.monthPlanId ? "selected" : ""}>${plan.name}：${planText(plan)}${plan.enabled ? "" : "（已停用，仅当前用户保留）"}</option>`).join("")}</select></div>
      `;
      openModal();
    }

    function openAnnouncementModal(item = null) {
      currentModal = "announcement";
      modalContext = item;
      const draft = item || {
        title: "",
        audience: "全部用户",
        status: "草稿",
        expireAt: "",
        pinned: false,
        content: ""
      };
      setModalLayout("modal-wide", "triple-form");
      modalTitle.textContent = item ? `编辑公告 - ${item.id}` : "新建公告";
      modalBody.innerHTML = `
        <div class="form-item full"><label>公告标题</label><input id="announcementTitle" value="${escapeHtml(draft.title)}" placeholder="例如：套餐权益调整说明" /></div>
        <div class="form-item"><label>接收范围</label><select id="announcementAudience">${announcementAudiences.map(value => `<option value="${value}" ${draft.audience === value ? "selected" : ""}>${value}</option>`).join("")}</select></div>
        <div class="form-item"><label>状态</label><select id="announcementStatus"><option ${draft.status === "草稿" ? "selected" : ""}>草稿</option><option ${draft.status === "已发布" ? "selected" : ""}>已发布</option><option ${draft.status === "已下线" ? "selected" : ""}>已下线</option></select></div>
        <div class="form-item"><label>有效期</label><input id="announcementExpireAt" type="date" value="${escapeHtml(draft.expireAt)}" /></div>
        <label class="check-line"><input id="announcementPinned" type="checkbox" ${draft.pinned ? "checked" : ""} />置顶展示</label>
        <div class="form-item full"><label>公告内容</label><textarea id="announcementContent" placeholder="填写要在 App 内展示的公告内容">${escapeHtml(draft.content)}</textarea></div>
      `;
      openModal();
    }

    function openEditPlanModal(plan) {
      currentModal = "editPlan";
      modalContext = plan;
      setModalLayout("modal-wide", "triple-form");
      modalTitle.textContent = `修改套餐定价 - ${plan.name}`;
      modalBody.innerHTML = `
        <div class="form-note warn">修改套餐定价会影响后续选择该套餐时展示的价格和配额。原型暂不做套餐版本管理。</div>
        <div class="form-item"><label>价格</label><input id="planPrice" type="number" min="0" value="${plan.price}" /></div>
        <div class="form-item"><label>转写时长/小时</label><input id="planHours" type="number" min="0" value="${plan.hours}" /></div>
        <div class="form-item"><label>知识库问答/次</label><input id="planQa" type="number" min="0" value="${plan.qa}" /></div>
        <label class="check-line"><input id="planConfirm" type="checkbox" />已确认修改该套餐的价格和配额</label>
      `;
      openModal();
    }

    function togglePlanEnabled(plan) {
      plan.enabled = !plan.enabled;
      showToast(`${plan.name} 已${plan.enabled ? "启用" : "停用"}`);
      renderApp();
    }

    function saveModal() {
      if (currentModal === "freezeUser") {
        const reason = document.getElementById("freezeReason").value;
        const note = document.getElementById("freezeNote").value.trim();
        modalContext.status = "冻结";
        modalContext.freezeReason = reason;
        addChangeRecord(modalContext, "冻结用户", "正常", "冻结", note || reason);
        showToast(`${modalContext.name} 已冻结`);
      }
      if (currentModal === "unfreezeUser") {
        const note = document.getElementById("freezeNote").value.trim();
        const before = modalContext.freezeReason || "冻结";
        modalContext.status = "正常";
        modalContext.freezeReason = "";
        addChangeRecord(modalContext, "解除冻结", before, "正常", note || "-");
        showToast(`${modalContext.name} 已解除冻结`);
      }
      if (currentModal === "giftMember") {
        const days = Math.max(0, Number(document.getElementById("giftDays").value || 0));
        const hours = Math.max(0, Number(document.getElementById("giftHours").value || 0));
        const qa = Math.max(0, Number(document.getElementById("giftQa").value || 0));
        const note = document.getElementById("giftNote").value.trim();
        if (!days && !hours && !qa) {
          showToast("请填写赠送内容");
          return;
        }
        const before = `${modalContext.member} / ${modalContext.memberExpire}`;
        const afterParts = [];
        if (days) {
          modalContext.member = "会员";
          modalContext.memberExpire = addDays(modalContext.memberExpire, days);
          afterParts.push(`会员至 ${modalContext.memberExpire}`);
        }
        if (hours) afterParts.push(`转写 +${hours}小时`);
        if (qa) afterParts.push(`问答 +${qa}次`);
        const after = afterParts.join("，");
        addChangeRecord(modalContext, "赠送权益", before, after, note || after);
        showToast(`${modalContext.name} 已赠送权益`);
      }
      if (currentModal === "editMember") {
        const before = `${modalContext.member} / ${modalContext.memberExpire}`;
        modalContext.member = document.getElementById("memberLevel").value;
        modalContext.memberExpire = document.getElementById("memberExpire").value || "-";
        addChangeRecord(modalContext, "修改会员", before, `${modalContext.member} / ${modalContext.memberExpire}`, "-");
        showToast(`${modalContext.name} 的会员已修改`);
      }
      if (currentModal === "changePlan") {
        const beforePlan = planById(modalContext.monthPlanId).name;
        modalContext.monthPlanId = document.getElementById("monthPlan").value;
        const afterPlan = planById(modalContext.monthPlanId).name;
        addChangeRecord(modalContext, "更改当月套餐", beforePlan, afterPlan, "仅影响此人本月套餐");
        showToast(`${modalContext.name} 的本月套餐已更改`);
      }
      if (currentModal === "editPlan") {
        if (!document.getElementById("planConfirm").checked) {
          showToast("请先确认套餐修改");
          return;
        }
        modalContext.price = Number(document.getElementById("planPrice").value || modalContext.price);
        modalContext.hours = Number(document.getElementById("planHours").value || modalContext.hours);
        modalContext.qa = Number(document.getElementById("planQa").value || modalContext.qa);
        showToast(`${modalContext.name} 已保存`);
      }
      if (currentModal === "announcement") {
        const title = document.getElementById("announcementTitle").value.trim();
        const audience = document.getElementById("announcementAudience").value;
        const status = document.getElementById("announcementStatus").value;
        const expireAt = document.getElementById("announcementExpireAt").value;
        const pinned = document.getElementById("announcementPinned").checked;
        const content = document.getElementById("announcementContent").value.trim();
        if (!title) {
          showToast("请填写公告标题");
          return;
        }
        if (!content) {
          showToast("请填写公告内容");
          return;
        }
        const isNew = !modalContext;
        const item = modalContext || {
          id: nextAnnouncementId(),
          publishAt: "-",
          targetCount: 0,
          readCount: 0
        };
        const previousStatus = item.status;
        const previousAudience = item.audience;
        item.title = title;
        item.audience = audience;
        item.status = status;
        item.expireAt = expireAt || "-";
        item.pinned = pinned;
        item.content = content;
        if (status === "草稿") {
          item.publishAt = "-";
          item.targetCount = 0;
          item.readCount = 0;
        }
        if (status === "已发布") {
          if (previousStatus !== "已发布" || !item.publishAt || item.publishAt === "-") item.publishAt = nowText();
          if (isNew || previousAudience !== audience || !item.targetCount) item.targetCount = announcementTargetCount(audience);
          item.readCount = Math.min(Number(item.readCount) || 0, item.targetCount);
        }
        if (status === "已下线" && isNew) {
          item.publishAt = "-";
          item.targetCount = 0;
          item.readCount = 0;
        }
        if (isNew) announcements.unshift(item);
        showToast(`${title} 已保存`);
      }
      closeModal();
      renderApp();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 3200);
    }

    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("cancelModal").addEventListener("click", closeModal);
    document.getElementById("saveModal").addEventListener("click", saveModal);
    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && modalBackdrop.classList.contains("open")) closeModal();
    });

    renderApp();
  </script>
</body>
</html>
