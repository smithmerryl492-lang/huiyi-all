name: iOS Device Build

on:
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: Upload the exported IPA to TestFlight
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ios-device-build
  cancel-in-progress: false

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-26
    timeout-minutes: 60
    env:
      IOS_PROJECT_DIR: apps/ios_app
      IOS_SCHEME: HuiyiApp
      IOS_BUNDLE_ID: com.huiyi.app.ios
      IOS_TEAM_ID: G4C3ADW2F4
      IOS_PROFILE_NAME: Huiyi App Store Connect
      ARCHIVE_PATH: /tmp/HuiyiApp.xcarchive
      EXPORT_PATH: /tmp/ios-export
      SIGNING_DIR: /tmp/ios-signing
      KEYCHAIN_PATH: /tmp/huiyi-signing.keychain-db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          xcodebuild -showsdks
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Decode signing assets
        run: |
          set -euo pipefail
          mkdir -p "$SIGNING_DIR"
          printf '%s' '${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}' | base64 -D > "$SIGNING_DIR/distribution.p12"
          printf '%s' '${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}' | base64 -D > "$SIGNING_DIR/profile.mobileprovision"
          printf '%s' '${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}' | base64 -D > "$SIGNING_DIR/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"

      - name: Install signing certificate and profile
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$SIGNING_DIR/distribution.p12" \
            -k "$KEYCHAIN_PATH" \
            -P '${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}' \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PROFILE_UUID="$(security cms -D -i "$SIGNING_DIR/profile.mobileprovision" | plutil -extract UUID raw -o - -)"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$SIGNING_DIR/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "Installed provisioning profile $PROFILE_UUID"

      - name: Generate Xcode project
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          xcodegen generate

      - name: Archive
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -uo pipefail
          ARCHIVE_LOG="/tmp/huiyi-archive.log"
          xcodebuild archive \
            -project HuiyiApp.xcodeproj \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            2>&1 | tee "$ARCHIVE_LOG"
          ARCHIVE_STATUS=${PIPESTATUS[0]}
          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "::group::Archive error summary"
            grep -nEi "error:|fatal error|No signing|Signing|Provisioning|certificate|SwiftCompile|Command .* failed|ARCHIVE FAILED" "$ARCHIVE_LOG" || true
            echo "::endgroup::"
            exit "$ARCHIVE_STATUS"
          fi

      - name: Create export options
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>G4C3ADW2F4</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.huiyi.app.ios</key>
              <string>Huiyi App Store Connect</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          set -euo pipefail
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: huiyi-ios-ipa
          path: /tmp/ios-export/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_testflight == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$SIGNING_DIR/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" "$HOME/.appstoreconnect/private_keys/"
          IPA_PATH="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' | head -n 1)"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey '${{ secrets.APP_STORE_CONNECT_KEY_ID }}' \
            --apiIssuer '${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}' \
            --verbose
