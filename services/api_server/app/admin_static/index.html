<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>鲲穹会纪内部运营后台</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-muted: #f6f8fa;
      --surface-subtle: #fbfcfd;
      --surface-tint: #edf7f3;
      --line: #dce4ec;
      --line-strong: #c7d1dc;
      --ink: #17202b;
      --text: #2e3947;
      --muted: #657384;
      --weak: #9aa6b5;
      --nav: #fbfcfd;
      --nav-2: #f1f5f5;
      --nav-line: #dce5ec;
      --primary: #10746b;
      --primary-dark: #0a5d56;
      --primary-soft: #e8f4f1;
      --primary-line: #a8d3cb;
      --blue: #315f9f;
      --blue-soft: #edf4ff;
      --amber: #946217;
      --amber-soft: #fff7e8;
      --red: #b3261e;
      --red-soft: #fff2f0;
      --green: #0b7046;
      --green-soft: #e9f6ef;
      --shadow: 0 22px 60px rgba(31, 42, 61, 0.18);
      --shadow-soft: 0 1px 2px rgba(31, 42, 61, 0.05);
      --radius: 3px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      letter-spacing: 0;
      font-size: 14px;
      line-height: 1.5;
      text-rendering: optimizeLegibility;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(16, 116, 107, 0.35);
      outline-offset: 2px;
    }

    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      background: var(--bg);
      overflow: hidden;
    }

    .sidebar {
      min-width: 0;
      background: var(--nav);
      color: var(--text);
      border-right: 1px solid var(--nav-line);
      display: flex;
      flex-direction: column;
    }

    .brand {
      min-height: 72px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--nav-line);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      background: #eef5ff;
      border: 1px solid #d9e6f7;
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 25px;
      height: 25px;
    }

    .brand-title {
      min-width: 0;
      line-height: 1.2;
    }

    .brand-title strong {
      display: block;
      font-size: 16px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 760;
    }

    .brand-title span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-section {
      padding: 18px 18px 8px;
      color: #7b8795;
      font-size: 11px;
      font-weight: 700;
    }

    .nav {
      padding: 0 12px 14px;
      display: grid;
      gap: 4px;
    }

    .nav button {
      width: 100%;
      border: 1px solid transparent;
      min-height: 42px;
      padding: 0 12px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 11px;
      color: #4f5f70;
      background: transparent;
      text-align: left;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .nav button:hover {
      color: var(--ink);
      background: #f0f4f5;
    }

    .nav button.active {
      color: #0d3f3b;
      background: var(--primary-soft);
      border-color: #d2e7e2;
      box-shadow: inset 3px 0 0 var(--primary);
      font-weight: 700;
    }

    .nav svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 72px;
      padding: 0 32px;
      background: rgba(255, 255, 255, 0.98);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
      box-shadow: 0 1px 0 rgba(31, 42, 61, 0.02);
    }

    .crumb {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .crumb h1 {
      margin: 0;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.2;
      font-weight: 780;
    }

    .crumb span {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      padding: 24px 28px 32px;
      display: grid;
      gap: 18px;
      overflow: auto;
      scrollbar-color: #aeb8c5 #eef2f6;
      scrollbar-width: thin;
    }

    .op-strip {
      position: sticky;
      top: 12px;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid #cfe1db;
      border-radius: var(--radius);
      background: #eff8f5;
      color: #14554e;
      box-shadow: var(--shadow-soft);
    }

    .op-strip.show {
      display: flex;
    }

    .op-strip strong {
      font-size: 13px;
    }

    .op-strip span {
      font-size: 12px;
      color: #2e6b63;
    }

    #viewRoot {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .view-stack {
      width: 100%;
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .view-compact {
      max-width: none;
    }

    .view-balanced {
      max-width: none;
    }

    .button, .icon-btn, .text-btn, .primary-btn, .danger-btn {
      border: 1px solid var(--line-strong);
      min-height: 38px;
      border-radius: var(--radius);
      padding: 0 13px;
      background: #ffffff;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      line-height: 1;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
    }

    .modal .icon-btn {
      border-color: transparent;
      color: var(--muted);
      background: transparent;
    }

    .modal .icon-btn:hover {
      color: var(--ink);
      background: #eef2f4;
      border-color: transparent;
    }

    .button svg, .icon-btn svg, .text-btn svg, .primary-btn svg, .danger-btn svg {
      width: 16px;
      height: 16px;
    }

    .button:hover, .icon-btn:hover, .text-btn:hover {
      border-color: #9aa8b6;
      background: #f7f9fb;
    }

    .button:disabled, .icon-btn:disabled, .text-btn:disabled, .primary-btn:disabled, .danger-btn:disabled {
      opacity: 0.56;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .primary-btn {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
      box-shadow: 0 8px 18px rgba(16, 116, 107, 0.14);
    }

    .danger-btn {
      border-color: #f0b8b2;
      color: var(--red);
      background: #ffffff;
    }

    .danger-btn:hover {
      background: var(--red-soft);
    }

    .view-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 384px;
      gap: 18px;
      align-items: start;
      min-height: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: visible;
      min-width: 0;
      box-shadow: var(--shadow-soft);
    }

    .panel-head {
      min-height: 58px;
      padding: 13px 16px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: #fbfcfd;
    }

    .panel-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .panel-title h2 {
      margin: 0;
      color: var(--ink);
      font-size: 15px;
      font-weight: 760;
      line-height: 1.3;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .section-label {
      margin: 18px 0 10px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
    }

    .panel-body .section-label:first-child {
      margin-top: 0;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .users-table { min-width: 960px; }
    .finance-table { min-width: 620px; }
    .pricing-table { min-width: 900px; }
    .records-table { min-width: 1040px; }

    .users-table col.col-user { width: 24%; }
    .users-table col.col-phone { width: 17%; }
    .users-table col.col-member { width: 10%; }
    .users-table col.col-plan { width: 14%; }
    .users-table col.col-quota { width: 18%; }
    .users-table col.col-status { width: 11%; }
    .users-table col.col-action { width: 10%; }

    .finance-table col.col-user { width: auto; }
    .finance-table col.col-money { width: 168px; }
    .finance-table col.col-plan { width: 150px; }
    .finance-table col.col-status { width: 110px; }

    .pricing-table col.col-plan { width: 24%; }
    .pricing-table col.col-price { width: 120px; }
    .pricing-table col.col-hours { width: 150px; }
    .pricing-table col.col-qa { width: 170px; }
    .pricing-table col.col-status { width: 110px; }
    .pricing-table col.col-action { width: 150px; }

    .records-table col.col-time { width: 154px; }
    .records-table col.col-user { width: 190px; }
    .records-table col.col-type { width: 138px; }
    .records-table col.col-before { width: 190px; }
    .records-table col.col-after { width: 210px; }
    .records-table col.col-note { width: auto; }

    .data-table th {
      height: 40px;
      padding: 0 16px;
      text-align: left;
      color: #596777;
      background: var(--surface-muted);
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
      font-size: 12px;
    }

    .data-table td {
      height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid #edf2f6;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }

    .data-table td strong {
      color: var(--ink);
      font-weight: 740;
    }

    .data-table tr[data-id] {
      cursor: pointer;
    }

    .data-table tbody tr:hover {
      background: #f8fbfb;
    }

    .data-table tbody tr.selected {
      background: var(--primary-soft);
      box-shadow: inset 3px 0 0 var(--primary);
    }

    .data-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .data-table th.money,
    .data-table th.number,
    .data-table td.money,
    .data-table td.number {
      text-align: right;
      white-space: nowrap;
    }

    .data-table th.action,
    .data-table td.action {
      text-align: right;
    }

    .data-table td.action .row-actions {
      justify-content: flex-end;
    }

    .table-scroll {
      overflow-x: auto;
      scrollbar-color: #aeb8c5 #eef2f6;
      scrollbar-width: thin;
    }

    .table-footer {
      min-height: 56px;
      padding: 10px 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px 18px;
      flex-wrap: wrap;
    }

    .pager-left,
    .pager-right {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pager-right {
      margin-left: auto;
      justify-content: flex-end;
    }

    .pager-total,
    .pager-jumper,
    .pager-range {
      color: #606f80;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .pager-range strong {
      color: var(--ink);
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .pager-size {
      height: 32px;
      min-width: 98px;
      padding: 0 28px 0 10px;
      border: 1px solid #d2dbe5;
      border-radius: var(--radius);
      background:
        linear-gradient(45deg, transparent 50%, #7b8795 50%),
        linear-gradient(135deg, #7b8795 50%, transparent 50%),
        #ffffff;
      background-position:
        calc(100% - 16px) 13px,
        calc(100% - 11px) 13px,
        0 0;
      background-size: 5px 5px, 5px 5px, 100% 100%;
      background-repeat: no-repeat;
      color: var(--text);
      appearance: none;
      outline: 0;
    }

    .pager-size:hover,
    .pager-jump-input:hover {
      border-color: #a8b7c7;
    }

    .pager-size:focus,
    .pager-jump-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 116, 107, 0.10);
    }

    .pager-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .pager-prev,
    .pager-next,
    .pager-page,
    .pager-go {
      height: 32px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: #566475;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .pager-page {
      min-width: 32px;
      padding: 0 8px;
    }

    .pager-prev:hover,
    .pager-next:hover,
    .pager-page:hover,
    .pager-go:hover {
      color: var(--ink);
      background: #f1f5f8;
      border-color: #d7e0e9;
    }

    .pager-page.active {
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .pager-prev:disabled,
    .pager-next:disabled {
      cursor: not-allowed;
      color: var(--weak);
      background: transparent;
      border-color: transparent;
    }

    .pager-ellipsis {
      width: 24px;
      height: 32px;
      color: var(--weak);
      display: inline-grid;
      place-items: center;
      font-weight: 700;
    }

    .pager-jump-input {
      width: 52px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d2dbe5;
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      text-align: center;
      outline: 0;
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      background: #fbfcfd;
    }

    .field {
      min-height: 40px;
      border: 1px solid #cdd7e1;
      border-radius: var(--radius);
      background: #ffffff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      color: var(--muted);
    }

    .field span {
      color: #546171;
      font-size: 12px;
      font-weight: 700;
    }

    .field input, .field select {
      height: 38px;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .field input { width: 240px; }
    .field select { min-width: 118px; }

    .field:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 116, 107, 0.10);
    }

    .field:hover {
      border-color: #b8c5d1;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .summary-item {
      min-height: 82px;
      padding: 14px 16px;
      border-right: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 5px;
    }

    .summary-item:last-child { border-right: 0; }

    .summary-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-item strong {
      color: var(--ink);
      font-size: 21px;
      line-height: 1.15;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .detail-hero {
      padding: 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .detail-hero h2 {
      margin: 0;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.25;
    }

    .detail-hero p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-actions {
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .record-list {
      display: grid;
    }

    .record-list.scroll-area {
      max-height: 276px;
      overflow: auto;
      scrollbar-color: #aeb8c5 #eef2f6;
      scrollbar-width: thin;
    }

    .record-row {
      min-height: 64px;
      padding: 12px 16px;
      border-bottom: 1px solid #edf2f6;
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr) 128px;
      gap: 14px;
      align-items: center;
      font-size: 13px;
    }

    .record-row:last-child { border-bottom: 0; }

    .record-row strong {
      color: var(--ink);
      font-weight: 740;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sub-text {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .badge {
      min-height: 26px;
      padding: 0 8px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #ffffff;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #465364;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.ok { color: var(--green); border-color: #c4e2d0; background: var(--green-soft); }
    .badge.warn { color: var(--amber); border-color: #ead7b4; background: var(--amber-soft); }
    .badge.off { color: #687386; border-color: #d7dde6; background: #f2f4f7; }
    .badge.red { color: var(--red); border-color: #f0c0bb; background: var(--red-soft); }
    .badge.blue { color: var(--blue); border-color: #cbd6f2; background: var(--blue-soft); }
    .badge.teal { color: var(--primary); border-color: #b7ddd9; background: var(--primary-soft); }

    .detail-rail {
      position: sticky;
      top: 96px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      max-height: calc(100vh - 128px);
      overflow: auto;
      box-shadow: var(--shadow-soft);
    }

    .rail-head {
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      background: #fbfcfd;
    }

    .rail-head h3 {
      margin: 0;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.25;
    }

    .rail-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .rail-section {
      padding: 16px 18px;
      border-bottom: 1px solid #edf1f5;
    }

    .rail-section:last-child { border-bottom: 0; }

    .rail-section h4 {
      margin: 0 0 12px;
      color: #364152;
      font-size: 13px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .kv {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 9px 10px;
      line-height: 1.55;
      font-size: 13px;
    }

    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; min-width: 0; overflow-wrap: anywhere; }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .money, .number {
      font-variant-numeric: tabular-nums;
      font-weight: 720;
      color: var(--ink);
    }

    .muted { color: var(--muted); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      padding: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(9, 15, 24, 0.54);
      backdrop-filter: blur(6px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      max-height: calc(100vh - 48px);
      background: #ffffff;
      border: 1px solid #cfd8e3;
      border-radius: 4px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .modal.modal-narrow {
      width: min(440px, 100%);
    }

    .modal.modal-wide {
      width: min(680px, 100%);
    }

    .modal-head {
      min-height: 64px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fbfcfd;
    }

    .modal-head h3 {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      font-weight: 760;
      line-height: 1.25;
    }

    .modal-body {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 16px;
      overflow: auto;
      background: #ffffff;
    }

    .modal-body.single-form {
      grid-template-columns: 1fr;
    }

    .modal-body.triple-form {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .form-item {
      display: grid;
      gap: 7px;
    }

    .form-item.full { grid-column: 1 / -1; }

    .form-item label {
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }

    .form-item input, .form-item select, .form-item textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid #cdd7e1;
      border-radius: var(--radius);
      outline: 0;
      background: #ffffff;
      color: var(--text);
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .form-item input:hover, .form-item select:hover, .form-item textarea:hover {
      border-color: #aebbc8;
    }

    .form-item input::placeholder, .form-item textarea::placeholder {
      color: #9aa6b5;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
    }

    input[type="number"] {
      appearance: textfield;
    }

    .form-item select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #667085 50%),
        linear-gradient(135deg, #667085 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 19px,
        calc(100% - 13px) 19px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }

    .form-note {
      grid-column: 1 / -1;
      padding: 10px 12px;
      border: 0;
      border-left: 3px solid var(--primary);
      border-radius: 0;
      color: #315d59;
      background: #f3faf8;
      font-size: 12px;
      line-height: 1.55;
    }

    .form-note.warn {
      border-color: #c8902f;
      color: #7a4b10;
      background: #fff8e8;
    }

    .check-line {
      grid-column: 1 / -1;
      min-height: 40px;
      padding: 2px 0;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
    }

    .check-line input {
      width: 16px;
      height: 16px;
      min-height: 0;
      margin: 2px 0 0;
      padding: 0;
      flex: 0 0 auto;
    }

    .form-item textarea {
      resize: vertical;
      min-height: 96px;
    }

    .form-item input:focus, .form-item select:focus, .form-item textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 116, 107, 0.12);
      background: #ffffff;
    }

    .modal-foot {
      min-height: 62px;
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 90;
      min-width: 280px;
      max-width: 420px;
      display: none;
      padding: 13px 15px;
      border-radius: 4px;
      background: #111827;
      color: #ffffff;
      box-shadow: var(--shadow);
      font-size: 13px;
    }

    .toast.success { background: #0f766e; }
    .toast.error { background: #b42318; }
    .toast.loading { background: #334155; }

    .toast.show {
      display: block;
      animation: toast-in 160ms ease-out;
    }

    .button-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 999px;
      display: inline-block;
      animation: spin 700ms linear infinite;
    }

    .login-mask {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(4px);
      z-index: 120;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .login-mask.open {
      opacity: 1;
      pointer-events: auto;
    }

    .login-shell {
      width: min(420px, calc(100vw - 32px));
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .login-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .login-title h2 {
      margin: 0;
      font-size: 20px;
      color: var(--ink);
    }

    .login-title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .login-form {
      display: grid;
      gap: 14px;
    }

    .login-error {
      min-height: 20px;
      color: var(--red);
      font-size: 13px;
    }

    @keyframes toast-in {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1180px) {
      .view-grid {
        grid-template-columns: 1fr;
      }

      .detail-rail {
        position: static;
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: sticky;
        top: 0;
        z-index: 30;
      }

      .brand {
        min-height: 56px;
      }

      .nav-section {
        display: none;
      }

      .nav {
        display: flex;
        overflow-x: auto;
        border-bottom: 1px solid var(--nav-line);
        padding: 8px;
        scrollbar-width: none;
      }

      .nav::-webkit-scrollbar {
        display: none;
      }

      .nav button {
        flex: 0 0 auto;
        width: auto;
        white-space: nowrap;
      }

      .topbar {
        position: static;
        min-height: auto;
        padding: 16px 16px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace {
        padding: 16px;
      }

      .toolbar {
        gap: 8px;
      }

      .field {
        width: 100%;
      }

      .field input {
        width: 100%;
      }

      .field select {
        min-width: 0;
        flex: 1;
      }

      .table-scroll {
        -webkit-overflow-scrolling: touch;
      }

      .data-table {
        min-width: 640px;
      }

      .finance-table {
        min-width: 100%;
      }

      .finance-table col.col-money {
        width: 96px;
      }

      .users-table { min-width: 960px; }
      .pricing-table { min-width: 860px; }
      .records-table { min-width: 980px; }

      .data-table th,
      .data-table td {
        padding-left: 12px;
        padding-right: 12px;
      }

      .table-footer {
        justify-content: flex-start;
      }

      .pager-left,
      .pager-right {
        width: 100%;
        justify-content: flex-start;
      }

      .pager-right {
        margin-left: 0;
      }

      .pager-actions {
        max-width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .pager-actions::-webkit-scrollbar {
        display: none;
      }

      .modal-body {
        grid-template-columns: 1fr;
      }

      .modal-body.triple-form {
        grid-template-columns: 1fr;
      }

      .summary-strip,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .summary-item {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .summary-item:last-child {
        border-bottom: 0;
      }

      .record-row {
        grid-template-columns: 1fr;
      }

      .modal {
        width: min(100%, 560px);
      }

      .modal-backdrop {
        padding: 14px;
      }

      .modal-foot {
        justify-content: stretch;
      }

      .modal-foot .text-btn,
      .modal-foot .primary-btn {
        flex: 1;
      }
    }

    /* Component system v2: Element-style internal admin components */
    :root {
      --bg: #f3f5f8;
      --surface: #ffffff;
      --surface-muted: #f7f9fc;
      --surface-subtle: #fbfcfe;
      --line: #dcdfe6;
      --line-strong: #c7ceda;
      --ink: #1f2937;
      --text: #344054;
      --muted: #667085;
      --weak: #98a2b3;
      --nav: #fbfcfe;
      --nav-line: #e1e6ef;
      --primary: #1677ff;
      --primary-dark: #0958d9;
      --primary-soft: #eaf3ff;
      --green: #0f7a45;
      --green-soft: #ecfdf3;
      --red: #d92d20;
      --red-soft: #fff1f0;
      --amber: #b76e00;
      --amber-soft: #fff7e6;
      --blue: #175cd3;
      --blue-soft: #eff6ff;
      --radius: 4px;
      --shadow: 0 18px 46px rgba(16, 24, 40, 0.18);
      --shadow-soft: 0 1px 2px rgba(16, 24, 40, 0.04);
    }

    html, body {
      color: var(--text);
      background: var(--bg);
    }

    .app-shell {
      grid-template-columns: 240px minmax(0, 1fr);
      background: var(--bg);
    }

    .sidebar {
      background: var(--nav);
      border-right: 1px solid var(--nav-line);
    }

    .brand {
      min-height: 72px;
      border-bottom: 1px solid var(--nav-line);
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      background: #eef5ff;
      border-color: #d6e4ff;
    }

    .nav-section {
      padding: 18px 20px 8px;
      color: #7a8699;
      font-size: 12px;
      font-weight: 600;
    }

    .nav {
      padding: 0 12px 16px;
      gap: 4px;
    }

    .nav button {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 4px;
      color: #475467;
      font-size: 14px;
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
    }

    .nav button:hover {
      background: #f2f6fb;
      color: var(--ink);
    }

    .nav button.active {
      color: #0958d9;
      background: #eaf3ff;
      border-color: #cfe3ff;
      box-shadow: inset 3px 0 0 var(--primary);
      font-weight: 700;
    }

    .topbar {
      min-height: 72px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      box-shadow: none;
    }

    .crumb h1 {
      color: var(--ink);
      font-size: 22px;
      font-weight: 700;
    }

    .crumb span {
      color: var(--muted);
      font-size: 13px;
    }

    .workspace {
      padding: 24px 28px 36px;
      gap: 18px;
    }

    #viewRoot,
    .view-stack {
      gap: 18px;
    }

    .view-grid {
      grid-template-columns: minmax(0, 1fr) 384px;
      gap: 18px;
    }

    @media (max-width: 1440px) {
      .view-grid {
        grid-template-columns: minmax(0, 1fr) 340px;
      }
    }

    .panel,
    .detail-rail,
    .summary-strip {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .panel-head {
      min-height: 64px;
      padding: 14px 16px;
      background: var(--surface-subtle);
      border-bottom: 1px solid var(--line);
    }

    .panel-title h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .panel-title span {
      margin-top: 2px;
      font-size: 13px;
      color: var(--muted);
    }

    .button,
    .icon-btn,
    .text-btn,
    .primary-btn,
    .danger-btn {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 4px;
      border: 1px solid #d0d5dd;
      background: #ffffff;
      color: #344054;
      font-size: 14px;
      font-weight: 500;
      box-shadow: none;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
    }

    .button:hover,
    .icon-btn:hover,
    .text-btn:hover {
      color: var(--primary);
      border-color: #91caff;
      background: #f5faff;
    }

    .primary-btn {
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      box-shadow: none;
    }

    .danger-btn {
      color: var(--red);
      border-color: #ffa39e;
      background: #ffffff;
    }

    .danger-btn:hover {
      color: #ffffff;
      background: var(--red);
      border-color: var(--red);
    }

    .toolbar {
      padding: 14px 16px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }

    .filter-bar {
      min-height: 64px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-item {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .filter-item > span {
      color: #344054;
      font-size: 13px;
      font-weight: 600;
    }

    .filter-select,
    .filter-date {
      height: 36px;
      border: 1px solid #d0d5dd;
      border-radius: 4px;
      background: #ffffff;
      color: var(--ink);
      font-size: 14px;
      outline: 0;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .filter-select {
      min-width: 196px;
      padding: 0 32px 0 10px;
    }

    .filter-date {
      width: 150px;
      padding: 0 10px;
    }

    .search-input {
      width: 220px;
    }

    .date-filter {
      position: relative;
    }

    .date-range-btn {
      height: 36px;
      min-width: 208px;
      padding: 0 10px;
      border: 1px solid #d0d5dd;
      border-radius: 4px;
      background: #ffffff;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .date-range-btn span {
      min-width: 0;
      overflow: hidden;
      color: var(--ink);
      font-size: 14px;
      font-weight: 400;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-range-btn svg {
      width: 16px;
      height: 16px;
      color: #667085;
      flex: 0 0 auto;
    }

    .date-range-btn:hover,
    .date-range-btn.active {
      border-color: #98a2b3;
      background: #fbfcfd;
    }

    .date-range-btn.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
    }

    .date-popover {
      position: absolute;
      z-index: 50;
      top: calc(100% + 8px);
      left: 0;
      width: 336px;
      border: 1px solid #d0d5dd;
      border-radius: 4px;
      background: #ffffff;
      box-shadow: 0 12px 28px rgba(16, 24, 40, 0.14);
    }

    .date-filter.date-filter-right .date-popover {
      right: 0;
      left: auto;
    }

    .date-popover-head {
      min-height: 44px;
      padding: 0 10px;
      border-bottom: 1px solid #edf2f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .date-popover-head strong {
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
    }

    .date-jump-row {
      min-height: 44px;
      padding: 8px 10px;
      border-bottom: 1px solid #edf2f6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #344054;
      font-size: 13px;
      font-weight: 600;
    }

    .date-jump-select {
      height: 30px;
      border: 1px solid #d0d5dd;
      border-radius: 4px;
      background: #ffffff;
      color: var(--ink);
      font-size: 13px;
      outline: 0;
    }

    .date-jump-select.year {
      width: 92px;
    }

    .date-jump-select.month {
      width: 76px;
    }

    .calendar-panels {
      max-height: 196px;
      overflow-y: auto;
      scrollbar-color: #aeb8c5 #eef2f6;
      scrollbar-width: thin;
    }

    .calendar-panel {
      width: 100%;
    }

    .calendar-panel + .calendar-panel {
      border-top: 1px solid #edf2f6;
    }

    .calendar-month-title {
      padding: 12px 12px 2px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
      text-align: center;
    }

    .calendar-nav {
      width: 30px;
      height: 30px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: #475467;
      display: inline-grid;
      place-items: center;
    }

    .calendar-nav:hover {
      border-color: #d0d5dd;
      background: #f8fafc;
      color: var(--ink);
    }

    .calendar-nav svg {
      width: 16px;
      height: 16px;
      display: block;
      flex: 0 0 auto;
    }

    .calendar-week,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-week {
      padding: 8px 10px 4px;
      color: #667085;
      font-size: 12px;
      text-align: center;
    }

    .calendar-grid {
      padding: 0 10px 10px;
      gap: 2px;
    }

    .calendar-day {
      height: 34px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      display: inline-grid;
      place-items: center;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .calendar-day.outside {
      color: #b0bac8;
    }

    .calendar-day.in-range {
      background: #eef6ff;
      color: #175cd3;
    }

    .calendar-day.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
      font-weight: 760;
    }

    .calendar-day:hover {
      border-color: #91caff;
      background: #f5faff;
      color: var(--primary);
    }

    .calendar-day.selected:hover {
      color: #ffffff;
      background: var(--primary);
    }

    .date-popover-foot {
      min-height: 72px;
      padding: 8px 10px 10px;
      border-top: 1px solid #edf2f6;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
    }

    .date-popover-foot .date-foot-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .date-range-preview {
      min-height: 18px;
      color: #667085;
      font-size: 12px;
      line-height: 18px;
      font-variant-numeric: tabular-nums;
      overflow: visible;
      white-space: nowrap;
    }

    .filter-select:hover,
    .filter-date:hover {
      border-color: #98a2b3;
    }

    .filter-select:focus,
    .filter-date:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);
    }

    .filter-separator {
      color: #98a2b3;
      font-size: 13px;
    }

    .filter-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn {
      min-height: 36px;
      padding: 0 14px;
    }

    .field {
      min-height: 40px;
      border: 1px solid #d0d5dd;
      border-radius: 4px;
      background: #ffffff;
      color: var(--muted);
      padding: 0 12px;
    }

    .field span {
      color: #475467;
      font-size: 13px;
      font-weight: 600;
    }

    .field input,
    .field select {
      height: 38px;
      color: var(--ink);
      font-size: 14px;
    }

    .field:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.12);

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function money(value) {
      return `¥${Number(value).toLocaleString("zh-CN", { maximumFractionDigits: 2 })}`;
    }

    function formatMinutes(value) {
      const total = Math.max(0, Math.round(Number(value) || 0));
      const hours = Math.floor(total / 60);
      const minutes = total % 60;
      if (!hours && !minutes) return "0分钟";
      if (!hours) return `${minutes}分钟`;
      if (!minutes) return `${hours}小时`;
      return `${hours}小时${minutes}分钟`;
    }

      return `${formatMinutes(minutes)}转写，${Number(qa || 0).toLocaleString("zh-CN")}次问答`;
    }

    function quotaNumber(value) {
      return Math.max(0, Math.round(Number(value) || 0)).toLocaleString("zh-CN");
    }

    function hoursNumber(minutes) {
      return (Math.max(0, Number(minutes) || 0) / 60).toLocaleString("zh-CN", { maximumFractionDigits: 1 });
    }

    function planById(id) {
      if (!id || id === "none" || id === "no_plan") {

          id: "none",
          name: "无套餐",
          price: 0,
          hours: 0,
          qa: 0,
          enabled: true
        };

        price: 0,
        hours: 0,
        qa: 0,
        enabled: false
      };

      return users.find(user => user.id === id);

      return userById(selectedUserId) || users[0] || null;

      return userById(id)?.name || id;

      return dataStages.find(stage => stage.id === selectedDataStageId) || dataStages[0] || null;

    function periodLabel(start, end) {
      if (start && end) return `${start} 至 ${end}`;
      if (start) return `${start} 起`;
      if (end) return `${end} 前`;
      return "全部账期";
    }

    function currentDataPeriod() {
      if (dataPeriodMode === "all") {
        return { mode: "all", label: "全部账期", start: "", end: "" };
      }
      if (dataPeriodMode === "custom") {
        return { mode: "custom", label: periodLabel(customStartDate, customEndDate), start: customStartDate, end: customEndDate };
      }
      const stage = selectedDataStage();
      if (!stage) return { mode: "all", label: "全部账期", start: "", end: "" };
      return { mode: "stage", label: stage.name, start: stage.start, end: stage.end };
    }

    function dateInRange(date, start, end) {
      if (start && date < start) return false;
      if (end && date > end) return false;
      return true;
    }

    function formatDateValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function monthFromDate(dateValue) {
      const value = dateValue || "2026-06-01";
      return `${value.slice(0, 7)}-01`;
    }

    function addMonths(monthValue, delta) {
      const [year, month] = monthValue.split("-").map(Number);
      return formatDateValue(new Date(year, month - 1 + delta, 1));
    }

    function monthTitle(monthValue) {
      const [year, month] = monthValue.split("-").map(Number);
      return `${year}年${String(month).padStart(2, "0")}月`;
    }

    function dateRangeText(start, end, emptyText = "全部时间") {
      if (start && end) return `${start} 至 ${end}`;
      if (start) return `${start} 起`;
      if (end) return `${end} 前`;
      return emptyText;
    }

    function datePickerLabel(start, end, mode = "range") {
      if (mode === "single") return start || "选择日期";
      return dateRangeText(start, end);
    }

    function optionItems(items, selectedValue) {
      return items.map(item => `<option value="${item.value}" ${selectedValue === item.value ? "selected" : ""}>${item.label}</option>`).join("");
    }

    function sortControl(id, selectedValue, items) {
      return `
        <label class="filter-item">
          <span>排序</span>
          <select class="filter-select" id="${id}">${optionItems(items, selectedValue)}</select>
        </label>
      `;
    }

    function compareBasic(a, b, desc = false) {
      if (a === b) return 0;
      const result = a > b ? 1 : -1;
      return desc ? -result : result;
    }

    function compareText(a, b, desc = false) {
      const result = String(a || "").localeCompare(String(b || ""), "zh-CN");
      return desc ? -result : result;
    }

    function compareNumber(a, b, desc = false) {
      return compareBasic(Number(a) || 0, Number(b) || 0, desc);
    }

    function compareDateText(a, b, desc = false) {
      return compareBasic(String(a || ""), String(b || ""), desc);
    }

    function datePickerYearOptions() {
      const currentYear = Number(datePickerMonth.slice(0, 4)) || 2026;
      const start = currentYear - 2;
      return Array.from({ length: 6 }, (_, index) => start + index)
        .map(year => `<option value="${year}" ${year === currentYear ? "selected" : ""}>${year}</option>`)
        .join("");
    }

    function datePickerMonthOptions() {
      const currentMonth = Number(datePickerMonth.slice(5, 7)) || 1;
      return Array.from({ length: 12 }, (_, index) => index + 1)
        .map(month => `<option value="${month}" ${month === currentMonth ? "selected" : ""}>${month}月</option>`)

    }

      if (document.getElementById("dataKeyword")) {
        dataKeyword = document.getElementById("dataKeyword")?.value.trim() || "";
        dataPlanFilter = document.getElementById("dataPlanFilter")?.value || "全部";
        dataStatusFilter = document.getElementById("dataStatusFilter")?.value || "全部";
        dataSort = document.getElementById("dataSort")?.value || dataSort;
      }
      if (document.getElementById("orderKeyword")) {
        orderKeyword = document.getElementById("orderKeyword")?.value.trim() || "";
        orderProductFilter = document.getElementById("orderProductFilter")?.value || "全部";
        orderStatusFilter = document.getElementById("orderStatusFilter")?.value || "全部";
        orderSort = document.getElementById("orderSort")?.value || orderSort;
      }
      if (document.getElementById("dispatchAudienceMode")) {
        dispatchAudienceMode = document.getElementById("dispatchAudienceMode")?.value || dispatchAudienceMode;
        dispatchFilterPlanId = document.getElementById("dispatchFilterPlanId")?.value || dispatchFilterPlanId;
        dispatchFilterStatus = document.getElementById("dispatchFilterStatus")?.value || dispatchFilterStatus;
        dispatchFilterKeyword = document.getElementById("dispatchFilterKeyword")?.value || dispatchFilterKeyword;
        dispatchSort = document.getElementById("dispatchSort")?.value || dispatchSort;
      }
      if (document.getElementById("dispatchRecordKeyword")) {
        dispatchRecordKeyword = document.getElementById("dispatchRecordKeyword")?.value.trim() || "";
        dispatchRecordTypeFilter = document.getElementById("dispatchRecordTypeFilter")?.value || "全部";
        dispatchRecordSort = document.getElementById("dispatchRecordSort")?.value || dispatchRecordSort;
      }
      if (document.getElementById("changeKeyword")) {
        changeKeyword = document.getElementById("changeKeyword")?.value.trim() || "";
        changeTypeFilter = document.getElementById("changeTypeFilter")?.value || "全部";
        changeSort = document.getElementById("changeSort")?.value || changeSort;
      }
    }

    function openDateRangePicker(key, start, end) {
      syncFilterInputsFromDom();
      activeDatePickerKey = key;
      activeDatePickerMode = "range";
      draftRangeStart = start || "";
      draftRangeEnd = end || "";
      datePickerMonth = monthFromDate(start || end || datePickerMonth);
      renderCurrentView();
    }

    function openDateSinglePicker(key, value) {
      syncFilterInputsFromDom();
      activeDatePickerKey = key;
      activeDatePickerMode = "single";
      draftSingleDate = value || "";
      datePickerMonth = monthFromDate(value || datePickerMonth);
      renderCurrentView();
    }

    function setDatePickerMonth(delta) {
      datePickerMonth = addMonths(datePickerMonth, delta);
      renderCurrentView();
    }

    function selectDateInPicker(dateValue) {
      if (activeDatePickerMode === "single") {
        draftSingleDate = dateValue;
        datePickerMonth = monthFromDate(dateValue);
        renderCurrentView();
        return;
      }
      if (!draftRangeStart || (draftRangeStart && draftRangeEnd)) {
        draftRangeStart = dateValue;
        draftRangeEnd = "";
      } else if (dateValue < draftRangeStart) {
        draftRangeEnd = draftRangeStart;
        draftRangeStart = dateValue;
      } else {
        draftRangeEnd = dateValue;
      }
      datePickerMonth = monthFromDate(dateValue);
      renderCurrentView();
    }

    function resetPageForDatePicker(key) {
      if (key === "userCreated") tablePages.users = 1;
      if (key === "dataPeriod") tablePages.data = 1;
      if (key === "orders") tablePages.orders = 1;
      if (key === "dispatchPurchase" || key === "dispatchBefore") tablePages.dispatchUsers = 1;
      if (key === "dispatchRecords") tablePages.dispatchRecords = 1;
      if (key === "changes") tablePages.changes = 1;
    }

    function applyDatePicker() {
      if (activeDatePickerMode === "single") {
        if (activeDatePickerKey === "dispatchBefore") dispatchFilterBeforeDate = draftSingleDate;
      } else {
        if (activeDatePickerKey === "userCreated") {
          userCreatedStart = draftRangeStart;
          userCreatedEnd = draftRangeEnd;
        }
        if (activeDatePickerKey === "dataPeriod") {
          customStartDate = draftRangeStart;
          customEndDate = draftRangeEnd;
        }
        if (activeDatePickerKey === "orders") {
          orderStartDate = draftRangeStart;
          orderEndDate = draftRangeEnd;
        }
        if (activeDatePickerKey === "dispatchPurchase") {
          dispatchFilterStartDate = draftRangeStart;
          dispatchFilterEndDate = draftRangeEnd;
        }
        if (activeDatePickerKey === "dispatchRecords") {
          dispatchRecordStartDate = draftRangeStart;
          dispatchRecordEndDate = draftRangeEnd;
        }
        if (activeDatePickerKey === "changes") {
          changeStartDate = draftRangeStart;
          changeEndDate = draftRangeEnd;
        }
      }
      resetPageForDatePicker(activeDatePickerKey);
      if (activeDatePickerKey === "dispatchPurchase" || activeDatePickerKey === "dispatchBefore") {
        invalidateDispatchPreview();
      }
      activeDatePickerKey = "";
      renderCurrentView();
    }

    function clearDatePicker() {
      if (activeDatePickerMode === "single") {
        draftSingleDate = "";
      } else {
        draftRangeStart = "";
        draftRangeEnd = "";
      }
      applyDatePicker();
    }

    function cancelDatePicker() {
      activeDatePickerKey = "";
      renderCurrentView();
    }

    function calendarDayClass(dateValue, isOutside) {
      const selected = activeDatePickerMode === "single"
        ? dateValue === draftSingleDate
        : dateValue === draftRangeStart || dateValue === draftRangeEnd;
      const inRange = activeDatePickerMode === "range" && draftRangeStart && draftRangeEnd && dateValue > draftRangeStart && dateValue < draftRangeEnd;
      return ["calendar-day", isOutside ? "outside" : "", selected ? "selected" : "", inRange ? "in-range" : ""].filter(Boolean).join(" ");
    }

    function renderCalendarMonth(monthValue) {
      const [year, month] = monthValue.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1).getDay();
      const daysInCurrent = new Date(year, month, 0).getDate();
      const daysInPrev = new Date(year, month - 1, 0).getDate();
      const cells = Array.from({ length: 42 }, (_, index) => {
        const dayNumber = index - firstDay + 1;
        let cellYear = year;
        let cellMonth = month;
        let cellDay = dayNumber;
        let outside = false;
        if (dayNumber <= 0) {
          outside = true;
          cellMonth = month - 1;
          if (cellMonth === 0) {
            cellMonth = 12;
            cellYear -= 1;
          }
          cellDay = daysInPrev + dayNumber;
        } else if (dayNumber > daysInCurrent) {
          outside = true;
          cellMonth = month + 1;
          if (cellMonth === 13) {
            cellMonth = 1;
            cellYear += 1;
          }
          cellDay = dayNumber - daysInCurrent;
        }
        const dateValue = `${cellYear}-${String(cellMonth).padStart(2, "0")}-${String(cellDay).padStart(2, "0")}`;
        return `<button type="button" class="${calendarDayClass(dateValue, outside)}" onclick="event.stopPropagation(); selectDateInPicker('${dateValue}')">${cellDay}</button>`;
      }).join("");
      return `
        <div class="calendar-panel">
          <div class="calendar-month-title">${monthTitle(monthValue)}</div>
          <div class="calendar-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
          <div class="calendar-grid">${cells}</div>
        </div>
      `;
    }

    function renderDatePicker(key) {
      if (activeDatePickerKey !== key) return "";
      const visibleMonthCount = activeDatePickerMode === "range" ? 6 : 3;
      const calendars = Array.from({ length: visibleMonthCount }, (_, index) => renderCalendarMonth(addMonths(datePickerMonth, index))).join("");
      const rangeText = activeDatePickerMode === "single"
        ? datePickerLabel(draftSingleDate, "", "single")
        : dateRangeText(draftRangeStart, draftRangeEnd, "请选择日期范围");
      return `
        <div class="date-popover" onclick="event.stopPropagation()">
          <div class="date-popover-head">
            <button type="button" class="calendar-nav" onclick="event.stopPropagation(); setDatePickerMonth(-1)">${svg("i-chevron-left")}</button>
            <strong>${monthTitle(datePickerMonth)}</strong>
            <button type="button" class="calendar-nav" onclick="event.stopPropagation(); setDatePickerMonth(1)">${svg("i-chevron-right")}</button>
          </div>
          <div class="date-jump-row">
            <select class="date-jump-select year" onchange="event.stopPropagation(); setDatePickerYear(this.value)">${datePickerYearOptions()}</select>
            <select class="date-jump-select month" onchange="event.stopPropagation(); setDatePickerMonthNumber(this.value)">${datePickerMonthOptions()}</select>
          </div>
          <div class="calendar-panels">${calendars}</div>
          <div class="date-popover-foot">
            <div class="date-range-preview">${rangeText}</div>
            <div class="date-foot-actions">
              <button type="button" class="text-btn" onclick="event.stopPropagation(); clearDatePicker()">清空</button>
              <button type="button" class="text-btn" onclick="event.stopPropagation(); cancelDatePicker()">取消</button>
              <button type="button" class="primary-btn" onclick="event.stopPropagation(); applyDatePicker()">确定</button>
            </div>
          </div>
        </div>
      `;
    }

    function datePickerAlignClass(key) {
      return ["dispatchPurchase", "dispatchBefore", "dispatchRecords", "changes"].includes(key) ? " date-filter-right" : "";
    }

    function dateRangeControl(key, label, start, end) {
      const active = activeDatePickerKey === key ? "active" : "";
      return `
        <div class="filter-item date-filter${datePickerAlignClass(key)}">
          <span>${label}</span>
          <button type="button" class="date-range-btn ${active}" aria-haspopup="dialog" onclick="event.stopPropagation(); openDateRangePicker('${key}', '${start || ""}', '${end || ""}')">
            <span>${datePickerLabel(start, end)}</span>${svg("i-calendar")}
          </button>
          ${renderDatePicker(key)}
        </div>
      `;
    }

    function dateSingleControl(key, label, value) {
      const active = activeDatePickerKey === key ? "active" : "";
      return `
        <div class="filter-item date-filter${datePickerAlignClass(key)}">
          <span>${label}</span>
          <button type="button" class="date-range-btn ${active}" aria-haspopup="dialog" onclick="event.stopPropagation(); openDateSinglePicker('${key}', '${value || ""}')">
            <span>${datePickerLabel(value, "", "single")}</span>${svg("i-calendar")}
          </button>
          ${renderDatePicker(key)}
        </div>
      `;
    }

    function recordsInPeriod(records, period = currentDataPeriod()) {
      if (period.mode === "all") return records;
      return records.filter(record => dateInRange(record.date, period.start, period.end));
    }

    function userPeriodPaidAmount(userId, period = currentDataPeriod()) {
      return recordsInPeriod(paymentRecords, period)
        .filter(record => record.userId === userId)
        .reduce((sum, record) => sum + Number(record.amount), 0);
    }

    function totalPaid(period = currentDataPeriod()) {
      return users.reduce((sum, user) => sum + userPeriodPaidAmount(user.id, period), 0);
    }

    function uniqueUsers(list) {
      const seen = new Set();
      return list.filter(user => {
        if (!user || seen.has(user.id)) return false;
        seen.add(user.id);
        return true;
      });
    }

    function parseManualUsers(text) {
      const tokens = text.split(/[\s,，;；]+/).map(item => item.trim()).filter(Boolean);
      return uniqueUsers(tokens.map(token => users.find(user => [user.id, user.phone, user.name].includes(token))).filter(Boolean));
    }

    function dispatchPlanName() {
      return dispatchFilterPlanId === "all" || !dispatchFilterPlanId ? "全部套餐" : planById(dispatchFilterPlanId).name;
    }

    function planSelectOptions(selectedId, includeAll = true) {
      return `${includeAll ? `<option value="all" ${selectedId === "all" ? "selected" : ""}>全部套餐</option>` : ""}<option value="none" ${selectedId === "none" ? "selected" : ""}>无套餐</option>${plans.map(plan => `<option value="${plan.id}" ${selectedId === plan.id ? "selected" : ""}>${plan.name}</option>`).join("")}`;
    }

    function allPlanSelectOptions(selectedValue = "全部") {
      return `<option value="全部" ${selectedValue === "全部" ? "selected" : ""}>全部套餐</option><option value="none" ${selectedValue === "none" ? "selected" : ""}>无套餐</option>${plans.map(plan => `<option value="${plan.id}" ${selectedValue === plan.id ? "selected" : ""}>${plan.name}</option>`).join("")}`;
    }

    function orderProductOptions(selectedValue = "全部") {
      return `
        <option value="全部" ${selectedValue === "全部" ? "selected" : ""}>全部商品</option>
        <option value="type:plan" ${selectedValue === "type:plan" ? "selected" : ""}>全部套餐订单</option>
        <option value="type:addon" ${selectedValue === "type:addon" ? "selected" : ""}>全部加量包订单</option>
        ${plans.map(plan => `<option value="plan:${plan.id}" ${selectedValue === `plan:${plan.id}` ? "selected" : ""}>套餐：${plan.name}</option>`).join("")}
        ${addons.map(addon => `<option value="addon:${addon.id}" ${selectedValue === `addon:${addon.id}` ? "selected" : ""}>加量包：${addon.name}</option>`).join("")}
      `;
    }

    function orderMatchesProduct(order) {
      if (orderProductFilter === "全部") return true;
      if (orderProductFilter === "type:plan") return order.productType === "plan";
      if (orderProductFilter === "type:addon") return order.productType === "addon";
      if (orderProductFilter.startsWith("plan:")) return order.productType === "plan" && order.planId === orderProductFilter.slice(5);
      if (orderProductFilter.startsWith("addon:")) return order.productType === "addon" && order.addonId === orderProductFilter.slice(6);
      return true;
    }

    function userMatchesKeyword(user, keyword) {
      const value = String(keyword || "").trim().toLowerCase();
      if (!value) return true;
      return [user.id, user.name, user.phone].some(item => String(item).toLowerCase().includes(value));
    }

    function recordDate(value) {
      return String(value || "").slice(0, 10);
    }

    function uniqueValues(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function normalizeDispatchState() {
      if (!dispatchFilterPlanId) dispatchFilterPlanId = "all";
      if (dispatchFilterPlanId === "none" && ["periodPurchase", "beforePurchase"].includes(dispatchAudienceMode)) {
        dispatchAudienceMode = "currentPlan";
      }
      const recipients = dispatchPreviewValid() ? dispatchPreviewItems : uniqueUsers(dispatchBaseUsers());
      if (!dispatchCanGrantMemberDays(recipients) && dispatchType !== "quota") {
        dispatchType = "quota";
        dispatchMemberDays = 0;
      }
    }

    function invalidateDispatchPreview() {
      dispatchPreviewSignature = "";
      dispatchPreviewItems = [];
      dispatchPreviewScopeLabel = "";
    }

    function dispatchAudiencePayload() {
      return {
        audienceMode: dispatchAudienceMode,
        planId: dispatchFilterPlanId,
        startDate: dispatchFilterStartDate,
        endDate: dispatchFilterEndDate,
        beforeDate: dispatchFilterBeforeDate,
        statusFilter: dispatchAudienceMode === "currentList" ? "全部" : dispatchFilterStatus,
        keyword: dispatchAudienceMode === "currentList" ? "" : dispatchFilterKeyword,
        sort: dispatchSort,
        userIds: dispatchUserIds
      };
    }

    function dispatchPayload() {
      const canGrantDays = dispatchCanGrantMemberDays(dispatchPreviewValid() ? dispatchPreviewItems : dispatchRecipientsLocal());
      return {
        ...dispatchAudiencePayload(),
        type: canGrantDays ? dispatchType : "quota",
        memberDays: canGrantDays ? Math.max(0, Number(dispatchMemberDays) || 0) : 0,
        hours: Math.max(0, Number(dispatchHours) || 0),
        knowledgeQa: Math.max(0, Number(dispatchQa) || 0),
        reason: dispatchReason
      };
    }

    function dispatchSignature() {
      return JSON.stringify(dispatchAudiencePayload());
    }

    function dispatchPreviewValid() {
      return dispatchPreviewSignature && dispatchPreviewSignature === dispatchSignature();
    }

    async function refreshDispatchPreview(silent = false) {
      normalizeDispatchState();
      const signature = dispatchSignature();
      if (dispatchPreviewSignature === signature) return dispatchPreviewItems;
      if (!silent) showOperation("正在查询发放对象", "正在按当前条件读取最终名单。");
      try {
        const data = await adminFetch("/dispatch/preview", {
          method: "POST",
          body: JSON.stringify(dispatchAudiencePayload())
        });
        dispatchPreviewItems = Array.isArray(data.items) ? data.items : [];
        dispatchPreviewScopeLabel = data.scopeLabel || "";
        dispatchPreviewSignature = signature;
        return dispatchPreviewItems;
      } finally {
        if (!silent) hideOperation();
      }
    }

    function paymentMatchesPlan(record) {
      if (record.productType !== "plan") return false;
      return dispatchFilterPlanId === "all" || !dispatchFilterPlanId || record.planId === dispatchFilterPlanId;
    }

    function userPlanPayments(user, start = "", end = "") {
      return paymentRecords
        .filter(record => record.userId === user.id && paymentMatchesPlan(record) && dateInRange(record.date, start, end))
        .sort((a, b) => b.date.localeCompare(a.date));
    }

    function latestUserPlanPayment(user, start = "", end = "") {
      return userPlanPayments(user, start, end)[0] || null;
    }

    function userPassesDispatchStatus(user) {
      return dispatchFilterStatus === "全部" || user.status === dispatchFilterStatus;
    }

    function userPassesDispatchKeyword(user) {
      const keyword = dispatchFilterKeyword.trim().toLowerCase();
      if (!keyword) return true;
      return [user.id, user.name, user.phone].some(value => String(value).toLowerCase().includes(keyword));
    }

    function dispatchBaseUsers() {
      if (dispatchFilterPlanId === "none" && ["periodPurchase", "beforePurchase"].includes(dispatchAudienceMode)) {
        return [];
      }
      if (dispatchAudienceMode === "currentList") {
        return dispatchUserIds.map(userById).filter(Boolean);
      }
      if (dispatchAudienceMode === "currentPlan") {
        if (dispatchFilterPlanId === "none") return users.filter(user => user.monthPlanId === "none");
        if (dispatchFilterPlanId === "all" || !dispatchFilterPlanId) return users.filter(user => user.monthPlanId && user.monthPlanId !== "none");
        return users.filter(user => user.monthPlanId === dispatchFilterPlanId);
      }
      if (dispatchAudienceMode === "beforePurchase") {
        return users.filter(user => Boolean(latestUserPlanPayment(user, "", dispatchFilterBeforeDate)));
      }
      return users.filter(user => Boolean(latestUserPlanPayment(user, dispatchFilterStartDate, dispatchFilterEndDate)));
    }

    function dispatchRecipientsLocal() {
      const base = uniqueUsers(dispatchBaseUsers());
      if (dispatchAudienceMode === "currentList") {
        return sortDispatchRecipients(base);
      }
      return sortDispatchRecipients(base.filter(user => userPassesDispatchStatus(user) && userPassesDispatchKeyword(user)));
    }

    function dispatchRecipients() {
      normalizeDispatchState();
      return dispatchPreviewValid() ? dispatchPreviewItems : dispatchRecipientsLocal();
    }

    function dispatchCanGrantMemberDays(recipients = dispatchRecipientsLocal()) {
      return Boolean(recipients.length) && recipients.every(user => user.member === "会员" && user.monthPlanId && user.monthPlanId !== "none");
    }

    function dispatchAudienceLabel() {
      const planName = dispatchPlanName();
      if (dispatchPreviewValid() && dispatchPreviewScopeLabel) return dispatchPreviewScopeLabel;
      if (dispatchAudienceMode === "currentList") return dispatchSourceLabel;
      if (dispatchAudienceMode === "currentPlan") return `当前套餐为${planName}`;
      if (dispatchAudienceMode === "beforePurchase") return `${dispatchFilterBeforeDate || "指定日期"} 前购买过${planName}`;
      return `${periodLabel(dispatchFilterStartDate, dispatchFilterEndDate)} 购买过${planName}`;
    }

    function dispatchAudienceModeLabel() {
      if (dispatchAudienceMode === "currentList") return "指定名单";
      if (dispatchAudienceMode === "currentPlan") return "当前套餐";
      if (dispatchAudienceMode === "beforePurchase") return "某日期前购买";
      return "某时间段购买";
    }

    function dispatchMatchText(user) {
      if (dispatchAudienceMode === "currentList") return dispatchSourceLabel;
      if (dispatchAudienceMode === "currentPlan") return `当前套餐：${planById(user.monthPlanId).name}`;
      const record = dispatchAudienceMode === "beforePurchase"
        ? latestUserPlanPayment(user, "", dispatchFilterBeforeDate)
        : latestUserPlanPayment(user, dispatchFilterStartDate, dispatchFilterEndDate);
      return record ? `${record.date} 购买${planById(record.planId).name}` : "-";
    }

    function dispatchContentText() {
      const canGrantDays = dispatchCanGrantMemberDays(dispatchRecipients());
      if (!canGrantDays) return `转写 +${Math.max(0, Number(dispatchHours) || 0)}小时，问答 +${Math.max(0, Number(dispatchQa) || 0)}次`;
      if (dispatchType === "member") return `会员 +${Math.max(1, Number(dispatchMemberDays) || 1)}天`;
      if (dispatchType === "quota") return `转写 +${Math.max(0, Number(dispatchHours) || 0)}小时，问答 +${Math.max(0, Number(dispatchQa) || 0)}次`;
      return `会员 +${Math.max(1, Number(dispatchMemberDays) || 1)}天，转写 +${Math.max(0, Number(dispatchHours) || 0)}小时，问答 +${Math.max(0, Number(dispatchQa) || 0)}次`;
    }

    function setDispatchList(ids, label, options = {}) {
      dispatchUserIds = [...new Set(ids)].filter(id => userById(id));
      dispatchSourceLabel = label || "指定名单";
      dispatchAudienceMode = "currentList";
      dispatchStep = "audience";
      dispatchFilterStatus = options.excludeFrozen ? "正常" : "全部";
      if (typeof options.excludeFrozen === "boolean") {
        dispatchExcludeFrozen = options.excludeFrozen;
      }
      dispatchTab = "create";
      tablePages.dispatchUsers = 1;
      currentView = "dispatch";
      invalidateDispatchPreview();
      renderApp();
      showToast(`已加入 ${dispatchUserIds.length} 个用户到发放名单`);
    }

    function addDispatchUser(userId, label = "指定名单") {
      const user = userById(userId);
      if (!user) return;
      if (!dispatchUserIds.includes(userId)) {
        dispatchUserIds = [...dispatchUserIds, userId];
      }
      dispatchSourceLabel = label || "指定名单";
      dispatchAudienceMode = "currentList";
      dispatchStep = "audience";
      dispatchTab = "create";
      dispatchFilterStatus = "全部";
      tablePages.dispatchUsers = 1;
      currentView = "dispatch";
      invalidateDispatchPreview();
      renderApp();
      showToast(`已将 ${user.name} 加入发放名单`);
    }

    function startDispatchFromUsers() {
      const list = filteredUsers();
      setDispatchList(
        list.map(user => user.id),
        `指定名单：${userStatusFilter === "全部" ? "当前筛选结果" : userStatusFilter}`,
        { excludeFrozen: userStatusFilter !== "冻结" }
      );
    }

    function startDispatchFromData() {
      const period = currentDataPeriod();
      setDispatchList(lastDataRecipientIds, `数据查看：${period.label}`, { excludeFrozen: true });
    }

    function statusBadge(status) {
      const tone = status === "冻结" ? "red" : "ok";
      return `<span class="badge ${tone}">${status}</span>`;
    }

    function planStatusBadge(plan) {
      return `<span class="badge ${plan.enabled ? "ok" : "off"}">${plan.enabled ? "启用" : "停用"}</span>`;
    }

    function orderStatusBadge(status) {
      const tone = status === "支付成功" ? "ok" : status === "未支付" ? "blue" : status === "已退款" ? "warn" : "red";
      return `<span class="badge ${tone}">${status}</span>`;
    }

    function announcementStatusBadge(status) {
      const tone = status === "已发布" ? "ok" : status === "草稿" ? "blue" : "off";
      return `<span class="badge ${tone}">${status}</span>`;
    }

    function announcementTargetCount(audience) {
      if (audience === "会员用户") return users.filter(user => user.member === "会员").length;
      if (audience === "无会员用户") return users.filter(user => user.member === "无会员").length;
      return users.length;
    }

    function nextAnnouncementId() {
      const maxNumber = announcements.reduce((max, item) => {
        const number = Number(String(item.id || "").replace(/\D/g, ""));
        return Math.max(max, Number.isNaN(number) ? 0 : number);
      }, 1000);
      return `A${maxNumber + 1}`;
    }

    function planText(plan) {
      return `${money(plan.price)} / ${plan.hours}小时转写 + ${plan.qa}次问答 / 月`;
    }

    function addonText(addon) {
      const unitLabel = addon.unit === "hour" ? "小时" : addon.unit;
      return `${money(addon.price)} / ${unitLabel}`;
    }

    function nowText() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${year}-${month}-${day} ${hour}:${minute}`;
    }

    function sortUsers(list) {
      return [...list].sort((a, b) => {
        if (userSort === "createdAsc") return compareDateText(a.createdAt, b.createdAt) || compareText(a.name, b.name);
        if (userSort === "paidDesc") return compareNumber(a.paidAmount, b.paidAmount, true) || compareDateText(a.createdAt, b.createdAt, true);
        if (userSort === "paidAsc") return compareNumber(a.paidAmount, b.paidAmount) || compareDateText(a.createdAt, b.createdAt, true);
        if (userSort === "nameAsc") return compareText(a.name, b.name) || compareDateText(a.createdAt, b.createdAt, true);

        if (dataSort === "paidAsc") return compareNumber(a.paid, b.paid) || compareText(a.user.name, b.user.name);

        if (orderSort === "amountDesc") return compareNumber(a.amount, b.amount, true) || compareDateText(a.paidAt, b.paidAt, true);
        if (orderSort === "amountAsc") return compareNumber(a.amount, b.amount) || compareDateText(a.paidAt, b.paidAt, true);
        if (orderSort === "userAsc") return compareText(userName(a.userId), userName(b.userId)) || compareDateText(a.paidAt, b.paidAt, true);
        return compareDateText(a.paidAt, b.paidAt, true) || compareText(a.id, b.id, true);

        if (announcementSort === "readDesc") return compareNumber(a.readCount, b.readCount, true) || compareDateText(a.publishAt, b.publishAt, true);
        if (announcementSort === "readAsc") return compareNumber(a.readCount, b.readCount) || compareDateText(a.publishAt, b.publishAt, true);

    function summaryStrip(items) {

    function pageSizeFor(key) {
      return tablePageSizes[key] || 5;
    }

    function totalPagesFor(total, pageSize) {
      return Math.max(1, Math.ceil(total / pageSize));
    }

    function currentPageFor(key, total) {
      const pageSize = pageSizeFor(key);
      const totalPages = totalPagesFor(total, pageSize);
      tablePages[key] = Math.min(Math.max(tablePages[key] || 1, 1), totalPages);
      return tablePages[key];
    }

    function pagedItems(key, items) {
      const pageSize = pageSizeFor(key);
      const page = currentPageFor(key, items.length);
      const start = (page - 1) * pageSize;
      return items.slice(start, start + pageSize);
    }

    function setTablePage(key, page) {
      tablePages[key] = page;
      renderCurrentView();
    }

    function setTablePageSize(key, size) {
      tablePageSizes[key] = Math.max(1, Number(size) || pageSizeFor(key));
      tablePages[key] = 1;
      renderCurrentView();
    }

    function jumpTablePage(key, page) {
      tablePages[key] = Math.max(1, Number(page) || 1);
      renderCurrentView();
    }

    function pageSizeOptionsFor(key) {
      const base = [5, 10, 20, 50];
      const current = pageSizeFor(key);
      return base.includes(current) ? base : [...base, current].sort((a, b) => a - b);
    }

    function pagerRange(page, totalPages) {
      if (totalPages <= 5) {
        return Array.from({ length: totalPages }, (_, index) => index + 1);
      }
      const pages = [1];
      const start = Math.max(2, page - 1);
      const end = Math.min(totalPages - 1, page + 1);
      if (start > 2) pages.push("left-gap");
      for (let item = start; item <= end; item += 1) pages.push(item);
      if (end < totalPages - 1) pages.push("right-gap");
      pages.push(totalPages);
      return pages;
    }

    function renderPager(key, total) {
      const pageSize = pageSizeFor(key);
      const page = currentPageFor(key, total);
      const totalPages = totalPagesFor(total, pageSize);
      const start = total ? (page - 1) * pageSize + 1 : 0;
      const end = total ? Math.min(total, page * pageSize) : 0;
      const pageSizeOptions = pageSizeOptionsFor(key).map(size => `<option value="${size}" ${size === pageSize ? "selected" : ""}>${size}条/页</option>`).join("");
      const pageItems = pagerRange(page, totalPages).map(item => {
        if (typeof item === "string") return `<span class="pager-ellipsis">...</span>`;
        return `<button class="pager-page ${item === page ? "active" : ""}" onclick="setTablePage('${key}', ${item})" ${item === page ? `aria-current="page"` : ""}>${item}</button>`;
      }).join("");
      return `
        <div class="table-footer">
          <div class="pager-bar">
            <span class="pager-total">共 ${total} 条</span>
            <select class="pager-size" onchange="setTablePageSize('${key}', this.value)">${pageSizeOptions}</select>
            <nav class="pager-actions" aria-label="分页">
              <button class="pager-prev" onclick="setTablePage('${key}', ${page - 1})" ${page <= 1 ? "disabled" : ""}>上一页</button>
              ${pageItems}
              <button class="pager-next" onclick="setTablePage('${key}', ${page + 1})" ${page >= totalPages ? "disabled" : ""}>下一页</button>
            </nav>
            <label class="pager-jumper">前往 <input class="pager-jump-input" type="number" min="1" max="${totalPages}" value="${page}" onchange="jumpTablePage('${key}', this.value)" onkeydown="if(event.key === 'Enter') jumpTablePage('${key}', this.value)" /> 页</label>
          </div>
        </div>
      `;
    }

    function addDays(dateStr, days) {
      const base = dateStr === "-" ? new Date() : new Date(`${dateStr}T00:00:00`);
      if (Number.isNaN(base.getTime())) return dateStr;
      base.setDate(base.getDate() + days);
      const year = base.getFullYear();
      const month = String(base.getMonth() + 1).padStart(2, "0");
      const day = String(base.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }
