    function safeAdminErrorText(message, fallback = "操作失败，请稍后重试") {
      const text = String(message || "").trim();
      if (!text) return fallback;
      const lower = text.toLowerCase();
      if (lower.includes("timeout") || lower.includes("timed out")) return "请求超时，请稍后重试";
      if (
        lower.includes("internal server error") ||
        lower.includes("traceback") ||
        lower.includes("exception") ||
        lower.includes("sqlalchemy") ||
        lower.includes("pymysql") ||
        lower.includes("failed to connect") ||
        lower.includes("connection refused") ||
        lower.includes("lost connection") ||
        lower.includes("unexpected end of stream") ||
        lower.includes("okhttp") ||
        lower.includes("address@") ||
        lower.includes("http://") ||
        lower.includes("https://")
      ) {
        return "服务器维护中，请稍后重试";
      }
      return text.length > 120 ? fallback : text;
    }

    async function adminFetch(path, options = {}) {
      const headers = new Headers(options.headers || {});
      if (!headers.has("Content-Type") && options.body) headers.set("Content-Type", "application/json");
      if (adminAccessToken) headers.set("Authorization", `Bearer ${adminAccessToken}`);
      let response;
      try {
        response = await fetch(`${adminApiBase}${path}`, { ...options, headers });
      } catch (error) {
        throw new Error(safeAdminErrorText(error?.message, "服务器维护中，请稍后重试"));
      }
      const raw = await response.text();
      let data = {};
      if (raw) {
        try {
          data = JSON.parse(raw);
        } catch (error) {
          data = { detail: raw };
        }
      }
      if (response.status === 401 && path !== "/auth/login") {
        logoutAdmin("请重新登录后台");
        throw new Error("请重新登录后台");
      }
      if (!response.ok) {
        throw new Error(safeAdminErrorText(data.detail || data.message || raw, `请求失败：${response.status}`));
      }
      return data;
    }

    function replaceList(target, items) {
      target.splice(0, target.length, ...(items || []));
    }

    function upsertById(target, item) {
      if (!item || !item.id) return;
      const index = target.findIndex(current => current.id === item.id);
      if (index >= 0) {
        target.splice(index, 1, item);
      } else {
        target.unshift(item);
      }
    }

    function responseItem(data) {
      return data?.item || data;
    }

    function updateUserInState(user) {
      upsertById(users, user);
      if (user?.id) selectedUserId = user.id;
    }

    function markRelatedDataStale(...keys) {
      keys.forEach(key => {
        if (Object.prototype.hasOwnProperty.call(viewDataLoaded, key)) {
          viewDataLoaded[key] = false;

      });
    }

    async function loadAdminData() {

      replaceList(plans, data.plans);
      replaceList(addons, data.addons);

      replaceList(dataStages, data.dataStages);
      viewDataLoaded.users = true;
      if (users.length && !users.some(user => user.id === selectedUserId)) {
        selectedUserId = users[0].id;
      }
      if (!users.length) {
        selectedUserId = "";
      }
      if (dataStages.length && !dataStages.some(stage => stage.id === selectedDataStageId)) {
        selectedDataStageId = dataStages[0].id;
        customStartDate = dataStages[0].start;
        customEndDate = dataStages[0].end;
      }
      if (!dataStages.length) {
        selectedDataStageId = "";
        customStartDate = "";
        customEndDate = "";
      }
      if (plans.length && (!dispatchFilterPlanId || !plans.some(plan => plan.id === dispatchFilterPlanId))) {
        dispatchFilterPlanId = plans[0].id;
      }
      if (!plans.length) {
        dispatchFilterPlanId = "";
      }
    }

      const data = await adminFetch("/orders");

      replaceList(paymentRecords, (data.items || []).filter(order => order.status === "支付成功").map(order => ({

    async function ensureViewDataLoaded(view = currentView, force = false) {
      if (view === "users" && (!viewDataLoaded.users || force)) await loadAdminData();
      if (view === "data") await loadOrdersData(force);
      if (view === "orders") await loadOrdersData(force);
      if (view === "dispatch") await loadDispatchData(force);
      if (view === "announcements") await loadAnnouncementsData(force);
      if (view === "changes") await loadChangesData(force);
      if (view === "runtime") await loadRuntimeConfig(force);
      if (view === "detail") {
        await Promise.all([loadOrdersData(force), loadChangesData(force)]);
      }
    }

    function viewNeedsRemoteLoad(view) {
      if (view === "users") return !viewDataLoaded.users;
      if (view === "data" || view === "orders") return !viewDataLoaded.orders;
      if (view === "dispatch") return !viewDataLoaded.dispatch;
      if (view === "announcements") return !viewDataLoaded.announcements;
      if (view === "changes") return !viewDataLoaded.changes;
      if (view === "runtime") return !viewDataLoaded.runtime;
      if (view === "detail") return !viewDataLoaded.orders || !viewDataLoaded.changes;
      return false;
    }

    async function saveModal() {
      if (!currentModal || !modalContext) return;
      if (modalSaving) return;
      setModalBusy(true, saveLabelForCurrentModal());
      try {
        if (currentModal === "freezeUser" || currentModal === "unfreezeUser") {
          const frozen = currentModal === "freezeUser";
          showOperation(frozen ? "正在冻结用户" : "正在解除冻结", "正在写入用户状态并刷新列表。");
          const updated = await adminFetch(`/users/${encodeURIComponent(modalContext.id)}/freeze`, {
            method: "POST",
            body: JSON.stringify({
              frozen,
              reason: frozen ? document.getElementById("freezeReason").value : "",
              note: document.getElementById("freezeNote").value.trim()
            })
          });
          updateUserInState(responseItem(updated));
          markRelatedDataStale("changes", "dispatch");
          finishLocalAction(`${modalContext.name} 已${frozen ? "冻结" : "解除冻结"}`);
          return;
        }
        if (currentModal === "giftMember") {
          const canGrantDays = modalContext.member === "会员" && modalContext.monthPlanId && modalContext.monthPlanId !== "none";
          const days = canGrantDays ? Math.max(0, Number(document.getElementById("giftDays")?.value || 0)) : 0;
          const hours = Math.max(0, Number(document.getElementById("giftHours").value || 0));
          const qa = Math.max(0, Number(document.getElementById("giftQa").value || 0));
          if (!days && !hours && !qa) {
            setModalBusy(false);
            hideOperation();
            showToast("请填写赠送内容", "error");
            return;
          }
          showOperation("正在发放权益", "正在写入会员和额度记录，请勿重复点击。");
          const updated = await adminFetch(`/users/${encodeURIComponent(modalContext.id)}/gift`, {
            method: "POST",
            body: JSON.stringify({
              member_days: days,
              hours,
              qa,
              note: document.getElementById("giftNote").value.trim()
            })
          });
          updateUserInState(responseItem(updated));
          markRelatedDataStale("changes", "dispatch");
          finishLocalAction(`${modalContext.name} 已赠送权益`);
          return;
        }
        if (currentModal === "changePlan") {
          showOperation("正在更改当月套餐", "正在写入该用户本月权益配置。");
          const updated = await adminFetch(`/users/${encodeURIComponent(modalContext.id)}/month-plan`, {
            method: "PATCH",
            body: JSON.stringify({ plan_id: document.getElementById("monthPlan").value })
          });
          updateUserInState(responseItem(updated));
          markRelatedDataStale("changes", "dispatch");
          finishLocalAction(`${modalContext.name} 的本月套餐已更改`);
          return;
        }
        if (currentModal === "editPlan") {
          if (!document.getElementById("planConfirm").checked) {
            setModalBusy(false);
            hideOperation();
            showToast("请先确认套餐修改", "error");
            return;
          }
          const enabled = Boolean(modalContext.enabled);
          showOperation("正在保存套餐", "正在更新套餐价格和配额。");
          const updated = await adminFetch(`/plans/${encodeURIComponent(modalContext.id)}`, {
            method: "PATCH",
            body: JSON.stringify({
              price: Number(document.getElementById("planPrice").value || modalContext.price),
              hours: Number(document.getElementById("planHours").value || modalContext.hours),
              qa: Number(document.getElementById("planQa").value || modalContext.qa),
              enabled
            })
          });
          upsertById(plans, responseItem(updated));
          markRelatedDataStale("changes");
          finishLocalAction(`${modalContext.name} 已保存`);
          return;
        }
        if (currentModal === "editAddon") {
          if (!document.getElementById("addonConfirm").checked) {
            setModalBusy(false);
            hideOperation();
            showToast("请先确认加量包修改", "error");
            return;
          }
          const enabled = Boolean(modalContext.enabled);
          showOperation("正在保存加量包", "正在更新加量包价格。");
          const updated = await adminFetch(`/addons/${encodeURIComponent(modalContext.id)}`, {
            method: "PATCH",
            body: JSON.stringify({
              price: Number(document.getElementById("addonPrice").value || modalContext.price),
              enabled
            })
          });
          upsertById(addons, responseItem(updated));
          markRelatedDataStale("changes");
          finishLocalAction(`${modalContext.name} 已保存`);
          return;
        }
        if (currentModal === "manualOrder") {
          const userId = document.getElementById("manualOrderUser").value;
          const planId = document.getElementById("manualOrderPlan").value;
          const amount = Number(document.getElementById("manualOrderAmount").value || 0);
          const status = document.getElementById("manualOrderStatus").value;
          if (!userId || !planId) {
            setModalBusy(false);
            hideOperation();
            showToast("请选择用户和套餐", "error");
            return;
          }
          showOperation("正在录入订单", "正在写入订单并同步会员权益。");
          await adminFetch("/orders", {
            method: "POST",
            body: JSON.stringify({
              user_id: userId,
              plan_id: planId,
              amount,
              status,
              channel: "后台录入",
              paid_at: document.getElementById("manualOrderPaidAt").value || null,
              note: document.getElementById("manualOrderNote").value.trim()
            })
          });
          markRelatedDataStale("users", "data", "orders", "dispatch", "changes");
          await loadAdminData();
          await loadOrdersData(true);
          finishLocalAction("订单已录入");
          return;
        }
        if (currentModal === "announcement") {
          const title = document.getElementById("announcementTitle").value.trim();
          const content = document.getElementById("announcementContent").value.trim();
          if (!title) {
            setModalBusy(false);
            hideOperation();
            showToast("请填写公告标题", "error");
            return;
          }
          if (!content) {
            setModalBusy(false);
            hideOperation();
            showToast("请填写公告内容", "error");
            return;
          }
          showOperation("正在保存公告", "正在写入公告配置。");
          const saved = await adminFetch("/announcements", {
            method: "POST",
            body: JSON.stringify({
              id: modalContext?.id || null,
              title,
              content,
              audience: document.getElementById("announcementAudience").value,
              status: document.getElementById("announcementStatus").value,
              expireAt: document.getElementById("announcementExpireAt").value || null,
              pinned: document.getElementById("announcementPinned").checked
            })
          });
          upsertById(announcements, responseItem(saved));
          viewDataLoaded.announcements = true;
          markRelatedDataStale("changes");
          finishLocalAction(`${title} 已保存`);
        }
      } catch (error) {
        hideOperation();
        setModalBusy(false);
        showToast(error.message || "保存失败", "error");
      }
    }

    async function togglePlanEnabled(plan) {
      if (!plan) return;
      await runAction(
        plan.enabled ? "正在停用套餐" : "正在启用套餐",
        "正在更新套餐状态并刷新套餐列表。",
        async () => {
          try {
            const updated = await adminFetch(`/plans/${encodeURIComponent(plan.id)}`, {
              method: "PATCH",
              body: JSON.stringify({
                price: Number(plan.price || 0),
                hours: Number(plan.hours || 0),
                qa: Number(plan.qa || 0),
                enabled: !plan.enabled
              })
            });
            upsertById(plans, responseItem(updated));
            markRelatedDataStale("data", "orders", "dispatch", "changes");
            renderApp();
            showToast(`${plan.name} 已${plan.enabled ? "停用" : "启用"}`, "success");
          } catch (error) {
            showToast(error.message || "操作失败", "error");
          }
        }
      );
    }

    async function toggleAddonEnabled(addon) {
      if (!addon) return;
      await runAction(
        addon.enabled ? "正在停用加量包" : "正在启用加量包",
        "正在更新加量包状态。",
        async () => {
          try {
            const updated = await adminFetch(`/addons/${encodeURIComponent(addon.id)}`, {
              method: "PATCH",
              body: JSON.stringify({
                price: Number(addon.price || 0),
                enabled: !addon.enabled
              })
            });
            upsertById(addons, responseItem(updated));
            markRelatedDataStale("changes");
            renderApp();
            showToast(`${addon.name} 已${addon.enabled ? "停用" : "启用"}`, "success");
          } catch (error) {
            showToast(error.message || "操作失败", "error");
          }
        }
      );
    }

    async function toggleAnnouncementStatus(item) {
      if (!item) return;
      await runAction(
        item.status === "已发布" ? "正在下线公告" : "正在发布公告",
        "正在写入公告状态并刷新列表。",
        async () => {
          try {
            const updated = await adminFetch(`/announcements/${encodeURIComponent(item.id)}/toggle`, { method: "POST" });
            upsertById(announcements, responseItem(updated));
            viewDataLoaded.announcements = true;
            markRelatedDataStale("changes");
            renderApp();
            showToast(`${item.title} 已${item.status === "已发布" ? "下线" : "发布"}`, "success");
          } catch (error) {
            showToast(error.message || "操作失败", "error");
          }
        }
      );
    }

    async function confirmDispatch() {
      if (actionBusy) return;
      collectDispatchForm();
      const recipients = dispatchRecipients();
      if (!recipients.length) {
        showToast("没有符合条件的发放对象", "error");
        return;
      }
      await runAction(
        "正在统一发放",
        `正在给 ${recipients.length} 个对象写入发放记录，请勿重复点击。`,
        async () => {
          try {
            const batch = await adminFetch("/dispatch/grants", {
              method: "POST",
              body: JSON.stringify(dispatchPayload())
            });
            upsertById(dispatchBatches, responseItem(batch));
            markRelatedDataStale("users", "data", "orders", "changes", "dispatch");
            dispatchTab = "records";
            dispatchStep = "audience";
            await loadAdminData();
            await loadDispatchData(true);
            renderApp();
            showToast("发放已完成", "success");
          } catch (error) {
            showToast(error.message || "发放失败", "error");
          }
        }
      );
    }

    bootstrapAdminApp();
  </script>
</body>
</html>
